<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AURAH — Manage Store</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Outfit,sans-serif;background:#0c0b0e;color:#f0ece4;line-height:1.5;padding:24px}
.wrap{max-width:780px;margin:0 auto}
h1{font-size:24px;font-weight:600;letter-spacing:.02em;margin-bottom:4px}
.sub{color:rgba(240,236,228,.45);font-size:13px;margin-bottom:28px}
.card{background:#17151a;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:22px;margin-bottom:18px}
.card h2{font-size:15px;font-weight:600;margin-bottom:16px;color:#c9a85c}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:rgba(240,236,228,.5);margin-bottom:5px;margin-top:14px}
label:first-child{margin-top:0}
input,select,textarea{width:100%;background:#201e26;border:1px solid rgba(255,255,255,.1);color:#f0ece4;padding:10px 12px;border-radius:6px;font-family:inherit;font-size:14px;outline:none}
input:focus,select:focus,textarea:focus{border-color:#c9a85c}
textarea{resize:vertical;min-height:70px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
button{cursor:pointer;border:none;border-radius:6px;font-family:inherit;font-weight:600;font-size:13px;letter-spacing:.02em}
.btn-main{background:#c9a85c;color:#09080a;padding:11px 22px;margin-top:18px;width:100%}
.btn-main:hover{background:#e8c87a}
.btn-sm{background:transparent;border:1px solid rgba(255,255,255,.15);color:#f0ece4;padding:6px 12px;font-size:12px}
.btn-sm:hover{border-color:#c9a85c;color:#c9a85c}
.btn-del{background:transparent;border:1px solid rgba(204,95,95,.3);color:#cc5f5f;padding:6px 12px;font-size:12px}
.btn-del:hover{background:rgba(204,95,95,.1)}
.upload{border:1px dashed rgba(255,255,255,.2);border-radius:6px;padding:18px;text-align:center;cursor:pointer;position:relative;margin-top:6px}
.upload:hover{border-color:#c9a85c;background:rgba(201,168,92,.05)}
.upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
.thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.thumb{width:60px;height:80px;border-radius:4px;overflow:hidden;position:relative;background:#201e26;border:1px solid rgba(255,255,255,.1)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb button{position:absolute;top:2px;right:2px;width:16px;height:16px;background:rgba(0,0,0,.7);color:#fff;border-radius:50%;font-size:10px;line-height:1;padding:0}
table{width:100%;border-collapse:collapse;margin-top:6px}
th{text-align:left;font-size:10px;text-transform:uppercase;color:rgba(240,236,228,.4);padding:8px;border-bottom:1px solid rgba(255,255,255,.08)}
td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;vertical-align:middle}
td img{width:32px;height:42px;object-fit:cover;border-radius:3px}
.toast{position:fixed;bottom:20px;right:20px;background:#201e26;border:1px solid rgba(255,255,255,.15);padding:12px 18px;border-radius:6px;font-size:13px;z-index:999}
.toast.ok{border-left:3px solid #5cb87a}
.toast.err{border-left:3px solid #cc5f5f}
.login-box{max-width:340px;margin:80px auto;text-align:center}
.tag{display:inline-flex;align-items:center;gap:5px;background:#201e26;border:1px solid rgba(255,255,255,.1);padding:4px 10px;border-radius:4px;font-size:12px;margin:3px}
.tag button{background:none;border:none;color:rgba(240,236,228,.4);cursor:pointer;padding:0}
.taglist{display:flex;flex-wrap:wrap;margin-top:6px;min-height:24px}
.linkbtn{background:none;border:none;color:#c9a85c;text-decoration:underline;cursor:pointer;font-size:12px;padding:0}
.hidden{display:none}
</style>
</head>
<body>
<div id="app"></div>

<script>
let TK = localStorage.getItem("aurah_tk") || "";
const api = {
  get: p => fetch("/api/admin"+p,{headers:{"X-Admin-Token":TK}}).then(r=>r.json()),
  post:(p,b)=>fetch("/api/admin"+p,{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":TK},body:JSON.stringify(b)}).then(r=>r.json()),
  put: (p,b)=>fetch("/api/admin"+p,{method:"PUT",headers:{"Content-Type":"application/json","X-Admin-Token":TK},body:JSON.stringify(b)}).then(r=>r.json()),
  del: p=>fetch("/api/admin"+p,{method:"DELETE",headers:{"X-Admin-Token":TK}}).then(r=>r.json()),
  upload:f=>{const fd=new FormData();fd.append("image",f);return fetch("/api/admin/upload",{method:"POST",headers:{"X-Admin-Token":TK},body:fd}).then(r=>r.json());}
};

let state = { products: [], categories: [], images: [] };

function toast(msg, type="ok") {
  const t = document.createElement("div");
  t.className = "toast " + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

async function checkLogin() {
  if (!TK) { renderLogin(); return; }
  try {
    const r = await fetch("/api/admin/products", { headers: { "X-Admin-Token": TK } });
    if (r.ok) { await loadData(); renderApp(); }
    else renderLogin();
  } catch(e) { renderLogin(); }
}

function renderLogin() {
  document.getElementById("app").innerHTML = `
    <div class="login-box">
      <h1>AURAH</h1>
      <p class="sub">Backend access</p>
      <div class="card">
        <label>Admin Token</label>
        <input id="tkInput" type="password" placeholder="Enter token"/>
        <button class="btn-main" onclick="doLogin()">Log In</button>
      </div>
    </div>`;
  document.getElementById("tkInput").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
}

async function doLogin() {
  const tk = document.getElementById("tkInput").value.trim();
  if (!tk) return;
  const r = await fetch("/api/admin/login", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({token:tk}) });
  if (r.ok) {
    TK = tk;
    localStorage.setItem("aurah_tk", tk);
    await loadData();
    renderApp();
  } else {
    toast("Wrong token", "err");
  }
}

function logout() {
  TK = "";
  localStorage.removeItem("aurah_tk");
  renderLogin();
}

async function loadData() {
  const [products, categories] = await Promise.all([
    api.get("/products"),
    api.get("/categories"),
  ]);
  state.products = Array.isArray(products) ? products : [];
  state.categories = Array.isArray(categories) ? categories : [];
}

function renderApp() {
  document.getElementById("app").innerHTML = `
    <div class="wrap">
      <h1>AURAH — Manage Store</h1>
      <p class="sub">Add products, categories, and photos directly &nbsp;·&nbsp; <button class="linkbtn" onclick="window.open('/','_blank')">View Store</button> &nbsp;·&nbsp; <button class="linkbtn" onclick="logout()">Log Out</button></p>

      <!-- ADD CATEGORY -->
      <div class="card">
        <h2>Add Category</h2>
        <label>Category Name</label>
        <input id="catName" placeholder="e.g. Accessories"/>
        <button class="btn-main" onclick="addCategory()">Add Category</button>
      </div>

      <!-- EXISTING CATEGORIES -->
      <div class="card">
        <h2>Categories (${state.categories.length})</h2>
        <table>
          <thead><tr><th>Name</th><th>ID</th><th>Products</th><th></th></tr></thead>
          <tbody>
            ${state.categories.map(c => `
              <tr>
                <td>${esc(c.label)}</td>
                <td style="opacity:.4;font-family:monospace">${c.id}</td>
                <td>${state.products.filter(p=>p.collection===c.id).length}</td>
                <td><button class="btn-del" onclick="deleteCategory('${c.id}')">Delete</button></td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>

      <!-- ADD PRODUCT -->
      <div class="card">
        <h2>Add Product</h2>
        <label>Product Name *</label>
        <input id="pName" placeholder="e.g. Atelier Wrap Coat"/>

        <div class="row">
          <div>
            <label>Category *</label>
            <select id="pCategory">
              ${state.categories.map(c=>`<option value="${c.id}">${esc(c.label)}</option>`).join("")}
            </select>
          </div>
          <div>
            <label>Subtitle</label>
            <input id="pSubtitle" placeholder="e.g. Camel / Cashmere"/>
          </div>
        </div>

        <div class="row3">
          <div>
            <label>Sell Price ($) *</label>
            <input id="pPrice" type="number" placeholder="0.00"/>
          </div>
          <div>
            <label>Cost Price ($)</label>
            <input id="pCost" type="number" placeholder="0.00"/>
          </div>
          <div>
            <label>Original Price ($)</label>
            <input id="pOrig" type="number" placeholder="for sale tag"/>
          </div>
        </div>

        <label>Description</label>
        <textarea id="pDesc" placeholder="Full product description..."></textarea>

        <div class="row">
          <div>
            <label>Sizes (comma separated)</label>
            <input id="pSizes" placeholder="XS, S, M, L, XL"/>
          </div>
          <div>
            <label>Badge</label>
            <select id="pBadge">
              <option value="">None</option>
              <option>Bestseller</option><option>New</option><option>Low Stock</option>
              <option>Editor's Pick</option><option>Gift Ready</option><option>Handcrafted</option><option>Sale</option>
            </select>
          </div>
        </div>

        <label>Photos</label>
        <div class="upload">
          <input type="file" accept="image/*" multiple onchange="handleUpload(this)"/>
          Click or drag to upload photos
        </div>
        <div class="thumbs" id="thumbs"></div>

        <label style="display:flex;align-items:center;gap:8px;margin-top:16px;text-transform:none">
          <input type="checkbox" id="pFeatured" style="width:auto"/> Show on homepage (featured)
        </label>

        <button class="btn-main" onclick="addProduct()">Add Product</button>
      </div>

      <!-- EXISTING PRODUCTS -->
      <div class="card">
        <h2>Products (${state.products.length})</h2>
        <table>
          <thead><tr><th></th><th>Name</th><th>Category</th><th>Price</th><th></th></tr></thead>
          <tbody>
            ${state.products.map(p => `
              <tr>
                <td>${p.images && p.images[0] && p.images[0].startsWith("data:") ? `<img src="${p.images[0]}"/>` : ""}</td>
                <td>${esc(p.name)}</td>
                <td style="opacity:.5">${esc(p.collection)}</td>
                <td>$${p.price}</td>
                <td><button class="btn-del" onclick="deleteProduct(${p.id})">Delete</button></td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>`;
}

function esc(s) { return String(s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function addCategory() {
  const label = document.getElementById("catName").value.trim();
  if (!label) return toast("Enter a category name", "err");
  try {
    await api.post("/categories", { label });
    await loadData();
    renderApp();
    toast("Category added");
  } catch(e) { toast("Failed to add category", "err"); }
}

async function deleteCategory(id) {
  if (!confirm("Delete this category?")) return;
  await api.del("/categories/" + id);
  await loadData();
  renderApp();
  toast("Category deleted");
}

async function handleUpload(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  toast("Uploading...", "ok");
  for (const f of files) {
    try {
      const r = await api.upload(f);
      if (r.url) state.images.push(r.url);
    } catch(e) { toast("Upload failed: " + f.name, "err"); }
  }
  renderThumbs();
  toast("Photos uploaded");
}

function renderThumbs() {
  document.getElementById("thumbs").innerHTML = state.images.map((img,i) =>
    `<div class="thumb"><img src="${img}"/><button onclick="removeImg(${i})">✕</button></div>`
  ).join("");
}

function removeImg(i) {
  state.images.splice(i, 1);
  renderThumbs();
}

async function addProduct() {
  const name = document.getElementById("pName").value.trim();
  const price = parseFloat(document.getElementById("pPrice").value);
  const collection = document.getElementById("pCategory").value;
  if (!name) return toast("Product name required", "err");
  if (!price) return toast("Sell price required", "err");
  if (!collection) return toast("Pick a category", "err");

  const data = {
    name, price, collection,
    subtitle: document.getElementById("pSubtitle").value,
    costPrice: parseFloat(document.getElementById("pCost").value) || 0,
    originalPrice: parseFloat(document.getElementById("pOrig").value) || null,
    description: document.getElementById("pDesc").value,
    sizes: document.getElementById("pSizes").value.split(",").map(s=>s.trim()).filter(Boolean),
    badge: document.getElementById("pBadge").value || null,
    images: state.images.length ? state.images : ["placeholder"],
    colors: [],
    details: [],
    rating: 4.8,
    reviews: 0,
    featured: document.getElementById("pFeatured").checked,
  };

  try {
    await api.post("/products", data);
    state.images = [];
    await loadData();
    renderApp();
    toast("Product added \u2713");
  } catch(e) { toast("Failed to add product", "err"); }
}

async function deleteProduct(id) {
  if (!confirm("Delete this product?")) return;
  await api.del("/products/" + id);
  await loadData();
  renderApp();
  toast("Product deleted");
}

checkLogin();
</script>
</body>
</html>
