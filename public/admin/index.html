<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AURAH Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0f0f0f;color:#e8e4dc;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(201,168,92,.3);border-radius:2px}
a{color:inherit;text-decoration:none}
input,select,textarea,button{font-family:inherit}

/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:#0a0a0a;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;z-index:100}
.main{margin-left:220px;flex:1;min-height:100vh}
.topbar{background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,.06);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.content{padding:28px}

/* Sidebar */
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-logo span{font-size:18px;letter-spacing:.2em;font-weight:500;color:#f0ece4}
.sidebar-logo sub{font-size:9px;letter-spacing:.1em;opacity:.4;text-transform:uppercase;margin-left:4px}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:4px 12px 2px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;opacity:.35;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:all .15s;border-left:2px solid transparent;font-size:13px;opacity:.6}
.nav-item:hover{opacity:1;background:rgba(255,255,255,.04)}
.nav-item.active{opacity:1;color:#c9a85c;border-left-color:#c9a85c;background:rgba(201,168,92,.06)}
.nav-icon{width:16px;text-align:center;flex-shrink:0}
.sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.06)}
.view-store-btn{display:flex;align-items:center;gap:8px;padding:9px 14px;border:1px solid rgba(201,168,92,.3);color:#c9a85c;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;background:transparent;width:100%;transition:all .2s;justify-content:center}
.view-store-btn:hover{background:rgba(201,168,92,.1)}

/* Cards */
.card{background:#161614;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:20px}
.card-sm{background:#161614;border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:14px}
.stat-card{background:#161614;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:20px}
.stat-val{font-size:28px;font-weight:600;margin:6px 0 2px}
.stat-label{font-size:11px;opacity:.45;letter-spacing:.06em;text-transform:uppercase}
.stat-change{font-size:11px;margin-top:6px}
.stat-change.up{color:#6dcc88}
.stat-change.dn{color:#cc6d6d}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.4;font-weight:500;border-bottom:1px solid rgba(255,255,255,.07);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
tr:last-child td{border-bottom:none}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;transition:all .2s;font-weight:500}
.btn-primary{background:#c9a85c;color:#0c0b09}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{background:transparent;border:1px solid rgba(255,255,255,.15);color:#e8e4dc}
.btn-secondary:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.04)}
.btn-danger{background:transparent;border:1px solid rgba(204,109,109,.3);color:#cc6d6d;padding:6px 12px;font-size:11px}
.btn-danger:hover{background:rgba(204,109,109,.1)}
.btn-icon{background:transparent;border:1px solid rgba(255,255,255,.1);color:inherit;padding:6px 10px;cursor:pointer;transition:all .2s}
.btn-icon:hover{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.05)}
.btn-sm{padding:6px 14px;font-size:10px}

/* Form */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-group.no-mb{margin-bottom:0}
label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;opacity:.5}
input[type=text],input[type=number],input[type=email],input[type=color],select,textarea{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#e8e4dc;
  padding:9px 12px;font-size:13px;outline:none;width:100%;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:rgba(201,168,92,.5)}
textarea{resize:vertical;min-height:80px}
select option{background:#1a1a1a}
input[type=color]{padding:4px;height:36px;cursor:pointer}
.input-row{display:flex;gap:6px}
.input-row input{flex:1}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(255,255,255,.07);font-size:11px;border-radius:2px}
.tag button{background:none;border:none;color:inherit;cursor:pointer;opacity:.5;font-size:13px;line-height:1;padding:0}
.tag button:hover{opacity:1}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#161614;border:1px solid rgba(255,255,255,.1);border-radius:10px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.modal-header{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-title{font-size:16px;font-weight:500}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,.07);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
.close-btn{background:none;border:none;color:inherit;opacity:.5;cursor:pointer;font-size:20px;line-height:1}
.close-btn:hover{opacity:1}

/* Badge */
.badge{display:inline-block;padding:3px 8px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;border-radius:2px}
.badge-gold{background:#c9a85c;color:#0c0b09}
.badge-green{background:#1a3a1a;color:#6dcc88}
.badge-red{background:#3a1a1a;color:#cc6d6d}
.badge-blue{background:#1a2a3a;color:#6da0cc}
.badge-gray{background:rgba(255,255,255,.08);color:#aaa}

/* Misc */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.section-title{font-size:18px;font-weight:500}
.section-sub{font-size:12px;opacity:.4;margin-top:2px}
.empty-state{text-align:center;padding:60px 20px;opacity:.35}
.empty-state p:first-child{font-size:24px;margin-bottom:8px}
.divider{border:none;border-top:1px solid rgba(255,255,255,.07);margin:20px 0}
.tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:20px}
.tab{padding:10px 18px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;opacity:.4;transition:all .15s}
.tab.active{opacity:1;color:#c9a85c;border-bottom-color:#c9a85c}
.img-preview{width:54px;height:54px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:9px;opacity:.4;overflow:hidden}
.img-preview img{width:100%;height:100%;object-fit:cover}
.color-dot{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,.15);flex-shrink:0}
.switch{position:relative;display:inline-block;width:36px;height:20px}
.switch input{opacity:0;width:0;height:0}
.slider-sw{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,.1);border-radius:20px;transition:.2s}
.slider-sw:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#888;border-radius:50%;transition:.2s}
.switch input:checked + .slider-sw{background:rgba(201,168,92,.8)}
.switch input:checked + .slider-sw:before{transform:translateX(16px);background:#0c0b09}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a}
.login-card{background:#161614;border:1px solid rgba(255,255,255,.08);padding:48px;width:100%;max-width:400px}

/* Toast */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1e1e1e;border:1px solid rgba(255,255,255,.1);padding:12px 18px;font-size:13px;min-width:240px;animation:fadeIn .25s ease;border-radius:4px}
.toast.success{border-left:3px solid #6dcc88}
.toast.error{border-left:3px solid #cc6d6d}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Image upload area */
.upload-area{border:1px dashed rgba(255,255,255,.2);padding:24px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.upload-area:hover{border-color:rgba(201,168,92,.5);background:rgba(201,168,92,.04)}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}

@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .form-row,.form-row-3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="admin-root"></div>

<script>
// ── API helpers ───────────────────────────────────────────
let ADMIN_TOKEN = localStorage.getItem("aurah_admin_token") || "";

const API = {
  get: (path) => fetch(`/api/admin${path}`, { headers: { "X-Admin-Token": ADMIN_TOKEN }}).then(r => { if (!r.ok) throw r; return r.json(); }),
  post: (path, body) => fetch(`/api/admin${path}`, { method:"POST", headers:{"Content-Type":"application/json","X-Admin-Token":ADMIN_TOKEN}, body: JSON.stringify(body) }).then(r => { if (!r.ok) throw r; return r.json(); }),
  put: (path, body) => fetch(`/api/admin${path}`, { method:"PUT", headers:{"Content-Type":"application/json","X-Admin-Token":ADMIN_TOKEN}, body: JSON.stringify(body) }).then(r => { if (!r.ok) throw r; return r.json(); }),
  del: (path) => fetch(`/api/admin${path}`, { method:"DELETE", headers:{"X-Admin-Token":ADMIN_TOKEN}}).then(r => { if (!r.ok) throw r; return r.json(); }),
  upload: (file) => {
    const fd = new FormData(); fd.append("image", file);
    return fetch("/api/admin/upload", { method:"POST", headers:{"X-Admin-Token":ADMIN_TOKEN}, body:fd }).then(r => r.json());
  },
};

// ── Toast ─────────────────────────────────────────────────
function showToast(msg, type = "success") {
  const tc = document.getElementById("toast-container");
  const t = document.createElement("div");
  t.className = `toast ${type}`;
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── State ─────────────────────────────────────────────────
let state = {
  loggedIn: !!ADMIN_TOKEN,
  page: "dashboard",
  products: [], categories: [], orders: [], settings: {}, homepage: {},
  modal: null,
  editingProduct: null,
  loading: false,
};

// ── Load data ─────────────────────────────────────────────
async function loadAll() {
  try {
    const [products, categories, orders, settings, homepage] = await Promise.all([
      API.get("/products"),
      API.get("/categories"),
      API.get("/orders"),
      fetch("/api/settings").then(r => r.json()),
      fetch("/api/homepage").then(r => r.json()),
    ]);
    state.products = products;
    state.categories = categories;
    state.orders = orders;
    state.settings = settings;
    state.homepage = homepage;
    render();
  } catch(e) {
    console.error(e);
    showToast("Failed to load data", "error");
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER ENGINE (lightweight vanilla React-like renderer)
// ═══════════════════════════════════════════════════════════
function render() {
  const root = document.getElementById("admin-root");
  if (!root) return;

  if (!state.loggedIn) { root.innerHTML = renderLogin(); attachLoginEvents(); return; }

  root.innerHTML = `
    <div class="layout">
      ${renderSidebar()}
      <div class="main">
        ${renderTopbar()}
        <div class="content">${renderPage()}</div>
      </div>
    </div>
    <div class="toast-container" id="toast-container"></div>
    ${state.modal ? renderModal() : ""}
  `;
  attachEvents();
}

// ── Login ──────────────────────────────────────────────────
function renderLogin() {
  return `
    <div class="login-wrap">
      <div class="login-card">
        <div style="text-align:center;margin-bottom:32px">
          <div style="font-size:22px;letter-spacing:.22em;font-weight:500;color:#f0ece4;margin-bottom:6px">AURAH</div>
          <div style="font-size:11px;opacity:.4;letter-spacing:.1em;text-transform:uppercase">Admin Panel</div>
        </div>
        <div class="form-group">
          <label>Admin Token</label>
          <input type="text" id="token-input" placeholder="Enter your admin token" style="font-family:monospace"/>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px" onclick="doLogin()">Access Dashboard</button>
        <p style="margin-top:16px;font-size:11px;opacity:.3;text-align:center">Default token: aurah-admin-secret-2026<br>Change via ADMIN_TOKEN env variable</p>
      </div>
      <div class="toast-container" id="toast-container"></div>
    </div>`;
}

function attachLoginEvents() {
  document.getElementById("token-input")?.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
}

async function doLogin() {
  const token = document.getElementById("token-input")?.value?.trim();
  if (!token) return;
  try {
    const res = await fetch("/api/admin/login", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ token }) });
    if (res.ok) {
      ADMIN_TOKEN = token;
      localStorage.setItem("aurah_admin_token", token);
      state.loggedIn = true;
      await loadAll();
    } else {
      showToast("Invalid token", "error");
    }
  } catch(e) { showToast("Connection error", "error"); }
}

// ── Sidebar ────────────────────────────────────────────────
function renderSidebar() {
  const nav = [
    { id:"dashboard", icon:"⊞", label:"Dashboard" },
    { id:"products", icon:"◫", label:"Products" },
    { id:"categories", icon:"⊟", label:"Categories" },
    { id:"orders", icon:"◳", label:"Orders" },
    { id:"homepage", icon:"⌂", label:"Homepage" },
    { id:"settings", icon:"⚙", label:"Settings" },
  ];
  return `
    <div class="sidebar">
      <div class="sidebar-logo">
        <span>AURAH</span><sub>Admin</sub>
      </div>
      <nav class="sidebar-nav">
        ${nav.map(n => `
          <div class="nav-item ${state.page === n.id ? "active" : ""}" onclick="goTo('${n.id}')">
            <span class="nav-icon">${n.icon}</span>
            <span>${n.label}</span>
            ${n.id === "orders" && state.orders.filter(o => o.status==="pending").length ? `<span style="margin-left:auto;background:#c9a85c;color:#0c0b09;border-radius:999px;padding:1px 6px;font-size:9px;font-weight:600">${state.orders.filter(o=>o.status==="pending").length}</span>` : ""}
          </div>
        `).join("")}
      </nav>
      <div class="sidebar-footer">
        <button class="view-store-btn" onclick="window.open('/','_blank')">
          ↗ View Store
        </button>
        <button class="btn-secondary btn btn-sm" style="width:100%;justify-content:center;margin-top:8px" onclick="logout()">Sign Out</button>
      </div>
    </div>`;
}

function renderTopbar() {
  const titles = { dashboard:"Dashboard", products:"Products", categories:"Categories", orders:"Orders", homepage:"Homepage Content", settings:"Store Settings" };
  const totalRevenue = state.orders.reduce((s, o) => s + (o.total || 0), 0);
  return `
    <div class="topbar">
      <div>
        <span style="font-size:15px;font-weight:500">${titles[state.page] || state.page}</span>
      </div>
      <div style="display:flex;align-items:center;gap:16px">
        <span style="font-size:12px;opacity:.4">${state.products.length} products · ${state.orders.length} orders · $${totalRevenue.toLocaleString()} revenue</span>
        <button class="btn btn-primary btn-sm" onclick="window.open('/','_blank')">↗ Live Store</button>
      </div>
    </div>`;
}

// ── Router ─────────────────────────────────────────────────
function renderPage() {
  switch(state.page) {
    case "dashboard": return renderDashboard();
    case "products": return renderProducts();
    case "categories": return renderCategories();
    case "orders": return renderOrders();
    case "homepage": return renderHomepage();
    case "settings": return renderSettings();
    default: return renderDashboard();
  }
}

// ── Dashboard ──────────────────────────────────────────────
function renderDashboard() {
  const totalRevenue = state.orders.reduce((s,o) => s+(o.total||0), 0);
  const pendingOrders = state.orders.filter(o=>o.status==="pending").length;
  const recentOrders = state.orders.slice(0,5);
  const statusColor = { pending:"badge-gold", processing:"badge-blue", shipped:"badge-green", delivered:"badge-green", cancelled:"badge-red" };

  return `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px">
      <div class="stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-val" style="color:#c9a85c">$${totalRevenue.toLocaleString()}</div>
        <div class="stat-change up">↑ All time</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-val">${state.orders.length}</div>
        <div class="stat-change" style="opacity:.4">${pendingOrders} pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Products</div>
        <div class="stat-val">${state.products.length}</div>
        <div class="stat-change" style="opacity:.4">${state.categories.length} categories</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Order Value</div>
        <div class="stat-val">$${state.orders.length ? Math.round(totalRevenue/state.orders.length).toLocaleString() : 0}</div>
        <div class="stat-change" style="opacity:.4">per order</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px">
      <div class="card">
        <div class="section-header" style="margin-bottom:16px">
          <div class="section-title" style="font-size:14px">Recent Orders</div>
          <button class="btn btn-secondary btn-sm" onclick="goTo('orders')">View All</button>
        </div>
        ${recentOrders.length === 0 ? `<div class="empty-state"><p>📦</p><p>No orders yet</p></div>` : `
        <table>
          <thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
          <tbody>${recentOrders.map(o => `
            <tr>
              <td style="font-family:monospace;font-size:11px;color:#c9a85c">${o.id}</td>
              <td>${o.firstName||""} ${o.lastName||""}</td>
              <td>$${(o.total||0).toLocaleString()}</td>
              <td><span class="badge ${statusColor[o.status]||'badge-gray'}">${o.status||"pending"}</span></td>
              <td style="opacity:.45;font-size:11px">${new Date(o.createdAt).toLocaleDateString()}</td>
            </tr>`).join("")}
          </tbody>
        </table>`}
      </div>
      <div class="card">
        <div class="section-title" style="font-size:14px;margin-bottom:16px">Top Products</div>
        ${state.products.filter(p=>p.featured).map(p => `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            <div class="img-preview"><span>${p.images?.[0]?.slice(0,3)||"—"}</span></div>
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
              <div style="font-size:11px;opacity:.4">$${p.price}</div>
            </div>
            <span class="badge badge-gold">Featured</span>
          </div>`).join("")}
      </div>
    </div>`;
}

// ── Products ───────────────────────────────────────────────
function renderProducts() {
  return `
    <div class="section-header">
      <div>
        <div class="section-title">Products</div>
        <div class="section-sub">${state.products.length} total products</div>
      </div>
      <button class="btn btn-primary" onclick="openProductModal(null)">+ Add Product</button>
    </div>
    <div class="card" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Badge</th><th>Featured</th><th>Actions</th></tr></thead>
          <tbody>
            ${state.products.map(p => `
              <tr>
                <td><div class="img-preview">${p.images?.[0] ? `<span style="font-size:9px">${p.images[0].slice(0,4)}</span>` : "—"}</div></td>
                <td>
                  <div style="font-weight:500">${p.name}</div>
                  <div style="font-size:11px;opacity:.4">${p.subtitle||""}</div>
                </td>
                <td><span class="badge badge-gray">${p.collection}</span></td>
                <td style="font-weight:500">$${p.price}${p.originalPrice ? `<span style="font-size:11px;opacity:.4;text-decoration:line-through;margin-left:6px">$${p.originalPrice}</span>` : ""}</td>
                <td>${p.badge ? `<span class="badge badge-gold">${p.badge}</span>` : `<span style="opacity:.25">—</span>`}</td>
                <td>
                  <label class="switch">

// ── Orders ─────────────────────────────────────────────────
function renderOrders() {
  const statuses = ["all","pending","processing","shipped","delivered","cancelled"];
  const activeStatus = state.ordersFilter || "all";
  const filtered = activeStatus === "all" ? state.orders : state.orders.filter(o=>o.status===activeStatus);
  const statusColor = { pending:"badge-gold", processing:"badge-blue", shipped:"badge-green", delivered:"badge-green", cancelled:"badge-red" };

  return `
    <div class="section-header">
      <div>
        <div class="section-title">Orders</div>
        <div class="section-sub">${state.orders.length} total · ${state.orders.filter(o=>o.status==="pending").length} pending</div>
      </div>
    </div>
    <div class="tabs">
      ${statuses.map(s => `<div class="tab ${activeStatus===s?"active":""}" onclick="filterOrders('${s}')">${s.charAt(0).toUpperCase()+s.slice(1)}${s==="all"?` (${state.orders.length})`:` (${state.orders.filter(o=>s==="all"||o.status===s).length})`}</div>`).join("")}
    </div>
    <div class="card" style="padding:0">
      <div class="table-wrap">
        ${filtered.length === 0 ? `<div class="empty-state"><p>📭</p><p>No orders</p></div>` : `
        <table>
          <thead><tr><th>Order ID</th><th>Customer</th><th>Email</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody>${filtered.map(o => `
            <tr>
              <td style="font-family:monospace;font-size:11px;color:#c9a85c">${o.id}</td>
              <td>${o.firstName||""} ${o.lastName||""}<br><span style="font-size:11px;opacity:.4">${o.address||""}</span></td>
              <td style="font-size:12px;opacity:.6">${o.email||""}</td>
              <td style="font-size:12px">${(o.items||[]).length} item${(o.items||[]).length!==1?"s":""}</td>
              <td style="font-weight:500">$${(o.total||0).toLocaleString()}</td>
              <td>
                <select onchange="updateOrderStatus('${o.id}', this.value)" style="font-size:11px;padding:4px 8px;width:auto">
                  ${["pending","processing","shipped","delivered","cancelled"].map(s=>`<option value="${s}" ${o.status===s?"selected":""}>${s}</option>`).join("")}
                </select>
              </td>
              <td style="opacity:.45;font-size:11px;white-space:nowrap">${new Date(o.createdAt).toLocaleDateString()}</td>
              <td><button class="btn-icon" onclick="viewOrder('${o.id}')" title="View">👁</button></td>

function renderModal() {
  const m = state.modal;
  if (m.type === "product") return renderProductModal(m.product);

  if (m.type === "order") return renderOrderModal(m.order);
  return "";
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════

function goTo(page) { state.page = page; render(); }
function logout() { ADMIN_TOKEN = ""; localStorage.removeItem("aurah_admin_token"); state.loggedIn = false; render(); }
function closeModal(e) { if (!e || e.target === e.currentTarget) { state.modal = null; render(); } }
function filterOrders(status) { state.ordersFilter = status; render(); }

function openProductModal(productId) {
  const product = productId ? state.products.find(p => p.id === productId) : null;
  state.modal = { type:"product", product: product ? JSON.parse(JSON.stringify(product)) : {} };
  render();
}

function openCategoryModal(catId) {
  const cat = catId ? state.categories.find(c => c.id === catId) : null;
  state.modal = { type:"category", category: cat ? JSON.parse(JSON.stringify(cat)) : null };
  render();
}

function viewOrder(orderId) {
  state.modal = { type:"order", order: orderId };
  render();
}

// Sizes/colors/details in product modal
function addSize() {
  const v = document.getElementById("new-size")?.value?.trim(); if (!v) return;
  const p = state.modal?.product;
  if (!p.sizes) p.sizes = [];
  if (!p.sizes.includes(v)) { p.sizes.push(v); render(); }
  else document.getElementById("new-size").value = "";
}
function removeSize(s) { const p = state.modal?.product; p.sizes = p.sizes.filter(x=>x!==s); render(); }

function addColor() {
  const name = document.getElementById("new-color-name")?.value?.trim();
  const hex = document.getElementById("new-color-hex")?.value;
  if (!name) return;
  const p = state.modal?.product;
  if (!p.colors) p.colors = [];
  p.colors.push({ name, hex });
  render();
}
function removeColor(name) { const p = state.modal?.product; p.colors = p.colors.filter(c=>c.name!==name); render(); }

function addDetail() {
  const v = document.getElementById("new-detail")?.value?.trim(); if (!v) return;
  const p = state.modal?.product;
  if (!p.details) p.details = [];
  p.details.push(v); render();
}
function removeDetail(i) { const p = state.modal?.product; p.details.splice(i, 1); render(); }

async function handleImageUpload(input) {
  const file = input.files[0]; if (!file) return;
  try {
    const result = await API.upload(file);
    if (result.url) {
      const imgInput = document.getElementById("p-images");
      const prev = imgInput.value;
      imgInput.value = prev ? prev + ", " + result.url : result.url;
      document.getElementById("upload-preview").innerHTML = `<img src="${result.url}" style="max-width:120px;max-height:120px;border:1px solid rgba(255,255,255,.1)"/>`;
      showToast("Image uploaded successfully");
    }
  } catch(e) { showToast("Upload failed", "error"); }
}

async function saveProduct(id) {
  const p = state.modal?.product || {};
  const name = document.getElementById("p-name")?.value?.trim();
  const price = parseFloat(document.getElementById("p-price")?.value);
  if (!name) { showToast("Product name is required", "error"); return; }
  if (!price) { showToast("Price is required", "error"); return; }

  const data = {
    ...p,
    name, price,
    subtitle: document.getElementById("p-subtitle")?.value||"",
    originalPrice: parseFloat(document.getElementById("p-original")?.value)||null,
    collection: document.getElementById("p-collection")?.value,
    badge: document.getElementById("p-badge")?.value||null,
    description: document.getElementById("p-desc")?.value||"",
    images: document.getElementById("p-images")?.value?.split(",").map(s=>s.trim()).filter(Boolean)||[],
    featured: document.getElementById("p-featured")?.checked||false,
    rating: parseFloat(document.getElementById("p-rating")?.value)||4.5,
    reviews: parseInt(document.getElementById("p-reviews")?.value)||0,
  };

  try {
    if (id) {
      const updated = await API.put(`/products/${id}`, data);
      state.products = state.products.map(p => p.id === id ? updated : p);
      showToast("Product updated");
    } else {
      const created = await API.post("/products", data);
      state.products.push(created);
      showToast("Product created");
    }
    state.modal = null; render();
  } catch(e) { showToast("Failed to save product", "error"); }
}

async function deleteProduct(id) {
  if (!confirm("Delete this product? This cannot be undone.")) return;
  try {
    await API.del(`/products/${id}`);
    state.products = state.products.filter(p => p.id !== id);
    showToast("Product deleted");
    render();
  } catch(e) { showToast("Failed to delete", "error"); }
}

async function toggleFeatured(id, val) {
  try {
    await API.put(`/products/${id}`, { featured: val });
    state.products = state.products.map(p => p.id === id ? {...p, featured: val} : p);
    showToast(val ? "Marked as featured" : "Removed from featured");
  } catch(e) { showToast("Failed to update", "error"); }
}

async function saveCategory(existingId) {
  const label = document.getElementById("c-label")?.value?.trim();
  const customId = document.getElementById("c-id")?.value?.trim();
  if (!label) { showToast("Label required", "error"); return; }
  try {
    if (existingId) {
      const updated = await API.put(`/categories/${existingId}`, { label });
      state.categories = state.categories.map(c => c.id === existingId ? updated : c);
      showToast("Category updated");
    } else {
      const created = await API.post("/categories", { label, id: customId||undefined });
      state.categories.push(created);
      showToast("Category created");
    }
    state.modal = null; render();
  } catch(e) { showToast("Failed to save category", "error"); }
}

async function deleteCategory(id) {
  if (!confirm(`Delete category "${id}"? Products in this category will not be deleted.`)) return;
  try {
    await API.del(`/categories/${id}`);
    state.categories = state.categories.filter(c => c.id !== id);
    showToast("Category deleted");
    render();
  } catch(e) { showToast("Failed to delete", "error"); }
}

async function updateOrderStatus(orderId, status) {
  try {
    const updated = await API.put(`/orders/${orderId}`, { status });
    state.orders = state.orders.map(o => o.id === orderId ? updated : o);
    showToast(`Order marked as ${status}`);
  } catch(e) { showToast("Failed to update order", "error"); }
}

function addTestimonial() {
  if (!state.homepage.testimonials) state.homepage.testimonials = [];
  state.homepage.testimonials.push({ quote:"", author:"", role:"", rating:5, product:"" });
  render();
}
function removeTestimonial(i) { state.homepage.testimonials.splice(i,1); render(); }

async function saveHomepage() {
  const testimonials = [];
  document.querySelectorAll(".t-quote").forEach((el,i) => {
    testimonials.push({
      quote: el.value,
      author: document.querySelectorAll(".t-author")[i]?.value||"",
      role: document.querySelectorAll(".t-role")[i]?.value||"",
      product: document.querySelectorAll(".t-product")[i]?.value||"",
      rating: 5,
    });
  });
  const hp = {
    hero: {
      badge: document.getElementById("hero-badge")?.value||"",
      headline: document.getElementById("hero-headline")?.value||"",
      subtext: document.getElementById("hero-subtext")?.value||"",
      ctaText: document.getElementById("hero-cta")?.value||"",
      ctaSecondary: document.getElementById("hero-cta2")?.value||"",
    },
    marquee: document.getElementById("marquee-items")?.value?.split(",").map(s=>s.trim()).filter(Boolean)||[],
    testimonials,
  };
  try {
    const updated = await API.put("/homepage", hp);
    state.homepage = updated;
    showToast("Homepage saved");
  } catch(e) { showToast("Failed to save", "error"); }
}

async function saveSettings() {
  const settings = {
    storeName: document.getElementById("s-name")?.value||"AURAH",
    tagline: document.getElementById("s-tagline")?.value||"",
    email: document.getElementById("s-email")?.value||"",
    instagram: document.getElementById("s-instagram")?.value||"",
    accentColor: document.getElementById("s-accent")?.value||"#c9a85c",
    theme: document.getElementById("s-theme")?.value||"dark",
    fontPair: document.getElementById("s-font")?.value||"cormorant",
    heroLayout: document.getElementById("s-hero")?.value||"split",
    cardRadius: parseInt(document.getElementById("s-radius")?.value)||0,
    currencySymbol: document.getElementById("s-currency")?.value||"$",
    freeShippingThreshold: parseFloat(document.getElementById("s-freeship")?.value)||150,
    shippingCost: parseFloat(document.getElementById("s-shipcost")?.value)||18,
  };
  try {
    const updated = await fetch("/api/admin/settings", { method:"PUT", headers:{"Content-Type":"application/json","X-Admin-Token":ADMIN_TOKEN}, body: JSON.stringify(settings) }).then(r=>r.json());
    state.settings = updated;
    showToast("Settings saved — reload store to see changes");
  } catch(e) { showToast("Failed to save settings", "error"); }
}

// ── Attach events ─────────────────────────────────────────
function attachEvents() {
  // Keyboard: close modal on ESC
  document.onkeydown = e => { if (e.key === "Escape" && state.modal) { state.modal = null; render(); } };
  // Enter to add tags
  document.getElementById("new-size")?.addEventListener("keydown", e => { if(e.key==="Enter") addSize(); });
  document.getElementById("new-detail")?.addEventListener("keydown", e => { if(e.key==="Enter") addDetail(); });
  // Range label update
  const radiusInput = document.getElementById("s-radius");
  if (radiusInput) {
    radiusInput.addEventListener("input", () => {
      const labels = document.querySelectorAll("label");
      labels.forEach(l => { if (l.textContent.startsWith("Card Border Radius")) l.textContent = `Card Border Radius (${radiusInput.value}px)`; });
    });
  }
}

// ── Init ──────────────────────────────────────────────────
render();
if (state.loggedIn) loadAll();
</script>
</body>
</html>
