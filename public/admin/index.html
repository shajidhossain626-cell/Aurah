<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AURAH Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07060a;--bg2:#0d0c12;--sf:#13111a;--sf2:#1a1825;--sf3:#211e2e;
  --bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.11);--bd3:rgba(255,255,255,.18);
  --gold:#c9a85c;--gold2:#e8c87a;--gold3:#a8883c;--gbg:rgba(201,168,92,.1);--gbg2:rgba(201,168,92,.18);
  --tx:#ede9e0;--tx2:rgba(237,233,224,.6);--tx3:rgba(237,233,224,.3);--tx4:rgba(237,233,224,.15);
  --green:#4ebd76;--grbg:rgba(78,189,118,.1);--green2:#3da062;
  --red:#cc5555;--rdbg:rgba(204,85,85,.1);
  --blue:#5599cc;--blbg:rgba(85,153,204,.1);
  --purple:#9966cc;--prbg:rgba(153,102,204,.1);
  --sb:248px;
  --rad:6px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
}
html,body{height:100%;overflow:hidden}
body{font-family:Outfit,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;display:flex}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(201,168,92,.15);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(201,168,92,.3)}
input,select,textarea,button{font-family:inherit;font-size:14px}

/* ── SIDEBAR ── */
.sidebar{width:var(--sb);min-width:var(--sb);background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:200;transition:transform .25s}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px}
.sb-logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--gold3),var(--gold2));border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#07060a;letter-spacing:.08em;flex-shrink:0}
.sb-logo-info{flex:1}
.sb-logo-name{font-size:16px;letter-spacing:.22em;color:var(--tx);font-weight:700;line-height:1}
.sb-logo-tag{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3);margin-top:2px}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-section{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx4);font-weight:600;padding:14px 18px 6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:var(--tx2);font-size:13px;font-weight:400;transition:all .12s;position:relative;border:none;background:none;width:100%;text-align:left}
.sb-item::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .12s}
.sb-item:hover{color:var(--tx);background:rgba(255,255,255,.025)}
.sb-item.on{color:var(--gold);background:var(--gbg);font-weight:500}
.sb-item.on::before{background:var(--gold)}
.sb-item svg{width:15px;height:15px;flex-shrink:0;stroke-width:1.7;opacity:.7}
.sb-item.on svg{opacity:1}
.sb-badge{margin-left:auto;background:var(--gold);color:#07060a;border-radius:999px;padding:1px 7px;font-size:9px;font-weight:700;letter-spacing:.04em}
.sb-badge.red{background:var(--red);color:#fff}
.sb-foot{padding:14px 16px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:8px}
.sb-live{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;border:1px solid rgba(201,168,92,.25);color:var(--gold);font-size:11px;letter-spacing:.09em;text-transform:uppercase;cursor:pointer;background:transparent;width:100%;transition:all .2s;border-radius:var(--rad);font-weight:600}
.sb-live:hover{background:var(--gbg);border-color:rgba(201,168,92,.5)}
.sb-out{background:none;border:1px solid var(--bd);color:var(--tx3);font-size:11px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;padding:8px;width:100%;transition:all .2s;border-radius:var(--rad);font-weight:500}
.sb-out:hover{color:var(--red);border-color:rgba(204,85,85,.35)}
.sb-version{font-size:10px;color:var(--tx4);text-align:center;letter-spacing:.04em}

/* ── MAIN AREA ── */
.main{margin-left:var(--sb);flex:1;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-title{font-size:15px;font-weight:600;letter-spacing:-.01em}
.tb-crumb{font-size:11px;color:var(--tx3)}
.tb-right{display:flex;align-items:center;gap:16px;font-size:11px;color:var(--tx3)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rad);padding:18px 20px;position:relative;overflow:hidden;cursor:default;transition:border-color .15s}
.stat:hover{border-color:var(--bd2)}
.stat-accent{position:absolute;top:0;left:0;right:0;height:2px}
.stat-ico{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:15px;flex-shrink:0}
.stat-lbl{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--tx3);font-weight:600;margin-bottom:5px}
.stat-num{font-size:26px;font-weight:700;letter-spacing:-.03em;line-height:1;margin-bottom:4px}
.stat-sub{font-size:11px;color:var(--tx3)}
.g-ico{background:var(--gbg)}.gr-ico{background:var(--grbg)}.r-ico{background:var(--rdbg)}.b-ico{background:var(--blbg)}.p-ico{background:var(--prbg)}

/* ── CARDS ── */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rad);padding:20px}
.csm{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rad)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.ct{font-size:13px;font-weight:600;letter-spacing:-.01em}
.cs{font-size:11px;color:var(--tx3);margin-top:2px}
.csec{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--bd)}

/* ── TABLE ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);font-weight:600;border-bottom:1px solid var(--bd);white-space:nowrap;background:var(--bg2)}
th:first-child{border-radius:var(--rad) 0 0 0}
th:last-child{border-radius:0 var(--rad) 0 0}
td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.025);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.cr{cursor:pointer}
tr.cr:hover td{background:rgba(255,255,255,.018)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;font-size:11px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;border:none;transition:all .15s;font-weight:600;border-radius:var(--rad);white-space:nowrap}
.btn-g{background:linear-gradient(135deg,var(--gold3),var(--gold));color:#07060a}.btn-g:hover{background:linear-gradient(135deg,var(--gold),var(--gold2));transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,92,.25)}
.btn-o{background:transparent;border:1px solid var(--bd2);color:var(--tx)}.btn-o:hover{border-color:var(--gold);color:var(--gold)}
.btn-d{background:transparent;border:1px solid rgba(204,85,85,.25);color:var(--red)}.btn-d:hover{background:var(--rdbg)}
.btn-blue{background:var(--blbg);border:1px solid rgba(85,153,204,.3);color:var(--blue)}.btn-blue:hover{background:rgba(85,153,204,.2)}
.btn-sm{padding:6px 13px;font-size:10px}
.btn-xs{padding:4px 10px;font-size:9px}
.bi{background:transparent;border:1px solid var(--bd);color:var(--tx2);padding:6px 9px;cursor:pointer;transition:all .15s;border-radius:4px;display:inline-flex;align-items:center;gap:4px;font-size:12px}
.bi:hover{border-color:var(--gold);color:var(--gold)}
.bi-r{border-color:rgba(204,85,85,.2);color:var(--red)}.bi-r:hover{background:var(--rdbg);border-color:rgba(204,85,85,.4)}
.bi-g{border-color:rgba(78,189,118,.2);color:var(--green)}.bi-g:hover{background:var(--grbg)}

/* ── FORM ── */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg.nm{margin-bottom:0}
.fg label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);font-weight:500}
.fg input,.fg select,.fg textarea{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:10px 13px;outline:none;width:100%;transition:all .15s;border-radius:4px}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(201,168,92,.4);background:var(--sf3)}
.fg textarea{resize:vertical;min-height:80px}
.fg select option{background:#13111a}
.fg input[type=color]{padding:3px;height:38px;cursor:pointer}
.fg input[type=range]{padding:0;height:auto;background:transparent;border:none;accent-color:var(--gold)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.f4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.fhint{font-size:10px;color:var(--tx3);margin-top:3px}
.fhint.ok{color:var(--green)}.fhint.warn{color:var(--gold)}.fhint.bad{color:var(--red)}

/* ── TAGS ── */
.tags{display:flex;flex-wrap:wrap;gap:6px;min-height:28px;margin-bottom:8px}
.tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--sf2);border:1px solid var(--bd);font-size:11px;border-radius:4px;color:var(--tx2)}
.tdel{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;line-height:1;padding:0 1px;transition:color .12s}
.tdel:hover{color:var(--red)}
.ar{display:flex;gap:7px;align-items:center}
.ar input{flex:1}

/* ── IMAGE GRID ── */
.ig{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.ic{position:relative;aspect-ratio:3/4;border-radius:5px;overflow:hidden;background:var(--sf2);border:1px solid var(--bd);transition:border-color .15s}
.ic:hover{border-color:var(--bd3)}
.ic img{width:100%;height:100%;object-fit:cover}
.ic .main-badge{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(135deg,var(--gold3),var(--gold));color:#07060a;font-size:7px;letter-spacing:.12em;text-transform:uppercase;text-align:center;padding:3px;font-weight:800}
.ic .rm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.8);border:none;color:#fff;width:20px;height:20px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;padding:0}
.ic:hover .rm{opacity:1}
.iph{display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;color:var(--tx3);padding:8px;text-align:center;word-break:break-all;flex-direction:column;gap:4px}
.iup{aspect-ratio:3/4;border:2px dashed var(--bd2);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;gap:6px}
.iup:hover,.iup.drag{border-color:var(--gold);background:var(--gbg)}
.iup input{position:absolute;inset:0;opacity:0;cursor:pointer}
.iup svg{width:20px;height:20px;color:var(--tx3)}
.iup span{font-size:9px;color:var(--tx3);text-align:center;line-height:1.5}
.iup .up-spinner{display:none;width:16px;height:16px;border:2px solid var(--bd2);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.img-count{font-size:10px;color:var(--tx3);margin-top:-4px;margin-bottom:10px}

/* ── MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;animation:bgIn .15s ease}
@keyframes bgIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--sf);border:1px solid var(--bd2);border-radius:10px;width:100%;max-width:800px;max-height:94vh;display:flex;flex-direction:column;box-shadow:0 40px 120px rgba(0,0,0,.8);animation:mIn .15s ease}
@keyframes mIn{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal.sm{max-width:440px}
.mh{padding:18px 24px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.mt{font-size:15px;font-weight:600}
.mb{padding:24px;overflow-y:auto;flex:1}
.mf{padding:14px 24px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;background:var(--bg2);border-radius:0 0 10px 10px}
.xb{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:20px;line-height:1;display:flex;padding:4px;transition:color .12s;border-radius:4px}
.xb:hover{color:var(--tx);background:rgba(255,255,255,.06)}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 9px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;border-radius:3px}
.bg{background:var(--gbg);color:var(--gold)}.bgn{background:var(--grbg);color:var(--green)}
.br{background:var(--rdbg);color:var(--red)}.bb{background:var(--blbg);color:var(--blue)}
.bpu{background:var(--prbg);color:var(--purple)}.bgr{background:rgba(255,255,255,.06);color:var(--tx2)}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:18px;gap:2px}
.tab{padding:9px 15px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;color:var(--tx3);transition:all .12s;font-weight:500}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover{color:var(--tx)}

/* ── SWITCH ── */
.sw{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.swt{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,.08);border-radius:22px;transition:.2s}
.swt::before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:rgba(255,255,255,.3);border-radius:50%;transition:.2s}
.sw input:checked+.swt{background:rgba(201,168,92,.7)}
.sw input:checked+.swt::before{transform:translateX(18px);background:#07060a}

/* ── UTILS ── */
.hr{border:none;border-top:1px solid var(--bd);margin:20px 0}
.hrl{display:flex;align-items:center;gap:12px;margin:20px 0}
.hrl::before,.hrl::after{content:"";flex:1;border-top:1px solid var(--bd)}
.hrl span{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3);font-weight:600}
.pt{height:4px;background:var(--sf2);border-radius:2px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:2px;transition:width .7s ease}
.sb-search{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:8px 13px;outline:none;border-radius:4px;font-size:12px;width:240px;transition:all .15s}
.sb-search:focus{border-color:rgba(201,168,92,.35);width:280px}
.sb-search::placeholder{color:var(--tx3)}
.sh{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px}
.stit{font-size:18px;font-weight:700;letter-spacing:-.02em}
.ssub{font-size:11px;color:var(--tx3);margin-top:3px}
.fb{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.csw{width:14px;height:14px;border-radius:50%;border:1px solid rgba(255,255,255,.15);display:inline-block;vertical-align:middle;margin-right:4px}
.rb{height:6px;border-radius:3px;background:var(--sf2);overflow:hidden;margin-top:4px}
.rf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold3),var(--gold))}
.rfg{background:linear-gradient(90deg,var(--green2),var(--green))}

/* ── TOAST ── */
.toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--sf);border:1px solid var(--bd2);padding:12px 16px;font-size:13px;min-width:220px;border-radius:6px;pointer-events:all;animation:tIn .2s ease;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.toast.ok{border-left:3px solid var(--green)}.toast.err{border-left:3px solid var(--red)}.toast.info{border-left:3px solid var(--gold)}
@keyframes tIn{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ── LOGIN ── */
.lw{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.lc{background:var(--sf);border:1px solid var(--bd2);padding:48px;width:100%;max-width:420px;border-radius:12px;box-shadow:var(--shadow)}
.lmark{width:56px;height:56px;background:linear-gradient(135deg,var(--gold3),var(--gold2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#07060a;letter-spacing:.08em;margin:0 auto 24px}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--tx3)}
.eico{font-size:32px;margin-bottom:12px;opacity:.6}
.empty p{font-size:13px;margin-top:4px}

/* ── ORDER TRACKER ── */
.ot{display:flex;margin-bottom:24px}
.ots{flex:1;text-align:center;position:relative}
.ots::after{content:"";position:absolute;top:14px;left:50%;right:-50%;height:2px;background:var(--bd);z-index:0}
.ots:last-child::after{display:none}
.otd{width:28px;height:28px;border-radius:50%;border:2px solid var(--bd);background:var(--sf2);display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:10px;color:var(--tx3);position:relative;z-index:1;transition:all .2s}
.otd.done{background:var(--gold);border-color:var(--gold);color:#07060a}
.otd.act{border-color:var(--gold);color:var(--gold);box-shadow:0 0 0 4px rgba(201,168,92,.15)}
.ots::after.done{background:var(--gold)}
.otl{font-size:9px;text-transform:capitalize;color:var(--tx3);font-weight:500}
.otl.done,.otl.act{color:var(--gold)}

/* ── PROFIT MARGIN DISPLAY ── */
.mgb{padding:10px 13px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;font-size:22px;font-weight:700;line-height:1.2;transition:color .2s}

/* ── DRAG HIGHLIGHT ── */
.drag-over{border-color:var(--gold)!important;background:var(--gbg)!important}

/* ── BULK ACTIONS ── */
.bulk-bar{background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rad);padding:10px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px;animation:tIn .15s ease}
.bulk-bar.hidden{display:none}

/* ── PROGRESS BAR ── */
.upload-progress{background:var(--sf2);border-radius:4px;overflow:hidden;height:4px;margin-top:8px;display:none}
.upload-progress.show{display:block}
.upload-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold));width:0%;transition:width .3s}

/* ── QUICK STATS SPARKLINE ── */
.sparkline{display:flex;align-items:flex-end;gap:2px;height:28px}
.spark-bar{flex:1;background:var(--gold);border-radius:1px;opacity:.6;min-height:2px;transition:opacity .15s}
.spark-bar:hover{opacity:1}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  :root{--sb:0px}
  .sidebar{transform:translateX(-248px);width:248px}
  .main{margin-left:0}
  .stats{grid-template-columns:1fr 1fr}
  .f2,.f3,.f4{grid-template-columns:1fr}
  .ig{grid-template-columns:repeat(3,1fr)}
  .menu-toggle{display:flex!important}
}
.menu-toggle{display:none;background:none;border:1px solid var(--bd);color:var(--tx2);width:34px;height:34px;border-radius:4px;cursor:pointer;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="root"></div>
<div class="toasts" id="toasts"></div>
<script>
"use strict";

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────

const A = {

  po: (p,b) => fetch("/api/admin" + p, {method:"POST", headers:{"Content-Type":"application/json","X-Admin-Token": TK}, body:JSON.stringify(b)}).then(r => { if(!r.ok) throw r; return r.json(); }),
  pu: (p,b) => fetch("/api/admin" + p, {method:"PUT", headers:{"Content-Type":"application/json","X-Admin-Token": TK}, body:JSON.stringify(b)}).then(r => { if(!r.ok) throw r; return r.json(); }),
  de: p => fetch("/api/admin" + p, {method:"DELETE", headers:{"X-Admin-Token": TK}}).then(r => { if(!r.ok) throw r; return r.json(); }),
  up: file => { const f = new FormData(); f.append("image", file); return fetch("/api/admin/upload", {method:"POST", headers:{"X-Admin-Token": TK}, body:f}).then(r => r.json()); }
};

function toast(msg, t = "ok") {
  const d = document.createElement("div");
  const ico = t === "ok" ? "✓" : t === "err" ? "✕" : "·";
  d.className = "toast " + t;
  d.innerHTML = `<span style="font-weight:700;font-size:12px;opacity:.7">${ico}</span><span>${msg}</span>`;
  document.getElementById("toasts").appendChild(d);
  setTimeout(() => { d.style.opacity = "0"; d.style.transition = "opacity .3s"; setTimeout(() => d.remove(), 300); }, 3000);
}

async function loadAll() {
  try {
    const [pr, ca, or, se, hp] = await Promise.all([
      A.g("/products").catch(() => []),
      A.g("/categories").catch(() => []),
      A.g("/orders").catch(() => []),
      fetch("/api/settings").then(r => r.json()).catch(() => ({})),
      fetch("/api/homepage").then(r => r.json()).catch(() => ({}))
    ]);
    S.products = Array.isArray(pr) ? pr : [];
    S.categories = Array.isArray(ca) ? ca : [];
    S.orders = Array.isArray(or) ? or : [];
    S.settings = se || {};
    S.homepage = hp || {};
    render();
  } catch(e) { toast("Load error: " + e.message, "err"); }
}

const esc = s => String(s || "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

const fmt = n => Number(n || 0).toLocaleString();
const fmtD = s => new Date(s).toLocaleDateString("en", {year:"numeric", month:"short", day:"numeric"});
const fmtDT = s => new Date(s).toLocaleString("en", {month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"});
const mg = (sell, cost) => sell > 0 && cost >= 0 ? Math.round((sell - cost) / sell * 100) : null;
const mc = m => m === null ? "var(--tx3)" : m >= 40 ? "var(--green)" : m >= 20 ? "var(--gold)" : "var(--red)";
const sb = s => ({pending:"bg", processing:"bb", shipped:"bpu", delivered:"bgn", cancelled:"br"}[s] || "bgr");
const imgSrc = (url) => url ? (url.startsWith("data:") || url.startsWith("/") || url.startsWith("http") ? url : null) : null;

function render() {
  const root = $("root"); if (!root) return;
  if (!S.auth) {
    root.innerHTML = tLogin();
    $("tkin")?.addEventListener("keydown", e => { if(e.key === "Enter") doLogin(); });
    return;
  }
  root.innerHTML = `
    <div class="sidebar" id="sb">${tSidebar()}</div>
    <div class="main">
      <div class="topbar">${tTopbar()}</div>
      <div class="content" id="cnt">${tPage()}</div>
    </div>
    ${S.modal ? tModal() : ""}`;
  bindKeys();
}
function rp() { const c = $("cnt"); if (c) c.innerHTML = tPage(); bindKeys(); }

  return `<div class="lw"><div class="lc">

    </p>
  </div></div>`;

async function doLogin() {
  const tk = $("tkin")?.value?.trim(); if (!tk) return;
  try {
    const r = await fetch("/api/admin/login", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({token:tk})});
    if (r.ok) {
      TK = tk; localStorage.setItem("adk", tk); S.auth = true;
      toast("Welcome to AURAH Admin ✓");
      await loadAll();
    } else {
      toast("Invalid token — check the default or your ADMIN_TOKEN env var", "err");
    }
  } catch(e) { toast("Cannot reach server. Is it running?", "err"); }
}
function doLogout() { TK = ""; localStorage.removeItem("adk"); S.auth = false; render(); }

function tDash() {
  const tr = S.orders.reduce((s,o)=>s+(o.total||0),0), tc = S.orders.reduce((s,o)=>s+(o.totalCost||0),0), tp = tr - tc;

  // Monthly sparkline data
  const monthly = {};
  S.orders.forEach(o => {
    const k = new Date(o.createdAt).toLocaleDateString("en", {month:"short"});

    monthly[k] += (o.total || 0);

    </div>

      <div class="stat-accent" style="background:${pend.length>0?"var(--gold)":"var(--purple)"}"></div>

// ─────────────────────────────────────────────
// REVENUE
// ─────────────────────────────────────────────
function tRev() {
  const orders = S.orders;
  const tr = orders.reduce((s,o)=>s+(o.total||0),0), tc = orders.reduce((s,o)=>s+(o.totalCost||0),0), tp = tr-tc;
  const pct = tr>0?(tp/tr*100).toFixed(1):0, avg = orders.length?Math.round(tr/orders.length):0;
  const monthly = {};
  orders.forEach(o => {
    const k = new Date(o.createdAt).toLocaleDateString("en", {year:"numeric", month:"short"});
    if (!monthly[k]) monthly[k] = {rev:0, cost:0, cnt:0};
    monthly[k].rev += (o.total||0); monthly[k].cost += (o.totalCost||0); monthly[k].cnt++;
  });
  const months = Object.entries(monthly).slice(-6);
  const maxR = Math.max(...months.map(([,v])=>v.rev), 1);
  const byP = S.products.map(p => {
    let u=0, r=0;
    orders.forEach(o => (o.items||[]).forEach(i => { if(i.id===p.id){u+=i.qty;r+=i.price*i.qty;} }));
    const c=(p.costPrice||0)*u, pr=r-c, pm=r>0?(pr/r*100).toFixed(1):0;
    return {p,u,r,c,pr,pm};
  }).filter(x=>x.r>0).sort((a,b)=>b.pr-a.pr);

  return `
  <div class="stats">
    <div class="stat"><div class="stat-accent" style="background:linear-gradient(90deg,var(--gold3),var(--gold2))"></div><div class="stat-ico g-ico">💵</div><div class="stat-lbl">Total Revenue</div><div class="stat-num" style="color:var(--gold)">$${fmt(tr)}</div><div class="stat-sub">${orders.length} orders</div></div>
    <div class="stat"><div class="stat-accent" style="background:var(--red)"></div><div class="stat-ico r-ico">🏭</div><div class="stat-lbl">Total Cost</div><div class="stat-num" style="color:var(--red)">$${fmt(tc)}</div><div class="stat-sub">Cost of goods sold</div></div>
    <div class="stat"><div class="stat-accent" style="background:var(--green)"></div><div class="stat-ico gr-ico">📊</div><div class="stat-lbl">Net Profit</div><div class="stat-num" style="color:var(--green)">$${fmt(tp)}</div><div class="stat-sub">${pct}% margin</div></div>
    <div class="stat"><div class="stat-accent" style="background:var(--blue)"></div><div class="stat-ico b-ico">🎫</div><div class="stat-lbl">Avg Order Value</div><div class="stat-num">$${fmt(avg)}</div><div class="stat-sub">per order</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card">
      <div class="ct" style="margin-bottom:16px">Monthly Revenue vs Profit</div>
      ${months.length===0 ? `<div class="empty"><div class="eico">📊</div><p>No orders yet</p></div>` :
      months.map(([mo,v]) => {
        const pr=v.rev-v.cost, rw=Math.round(v.rev/maxR*100), pw=v.rev>0?Math.round(pr/v.rev*rw):0;
        return `<div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px">
            <span style="color:var(--tx2);font-weight:600">${mo}</span>
            <span style="color:var(--tx3)">${v.cnt} orders</span>
            <span style="color:var(--gold)">$${fmt(v.rev)}</span>
            <span style="color:${pr>=0?"var(--green)":"var(--red)"}">${pr>=0?"+":""}$${fmt(pr)}</span>
          </div>
          <div class="rb"><div class="rf" style="width:${rw}%"></div></div>
          <div class="rb" style="margin-top:3px"><div class="rf rfg" style="width:${Math.max(0,pw)}%"></div></div>
        </div>`;
      }).join("")}
      <div style="display:flex;gap:14px;margin-top:8px;font-size:10px;color:var(--tx3)">
        <span><span style="display:inline-block;width:12px;height:3px;background:var(--gold);margin-right:4px;vertical-align:middle;border-radius:2px"></span>Revenue</span>
        <span><span style="display:inline-block;width:12px;height:3px;background:var(--green);margin-right:4px;vertical-align:middle;border-radius:2px"></span>Profit</span>
      </div>
    </div>
    <div class="card">
      <div class="ct" style="margin-bottom:16px">Profit Breakdown</div>
      ${[
        {l:"Gross Revenue",v:"$"+fmt(tr),c:"var(--gold)"},
        {l:"Cost of Goods Sold",v:tc?"− $"+fmt(tc):"Not tracked",c:"var(--red)"},
        {l:"Net Profit",v:"$"+fmt(tp),c:tp>=0?"var(--green)":"var(--red)",b:true},
        {l:"Profit Margin",v:pct+"%",c:parseFloat(pct)>=30?"var(--green)":parseFloat(pct)>=15?"var(--gold)":"var(--red)"},
        {l:"Avg Order Value",v:"$"+fmt(avg),c:"var(--tx)"},
        {l:"Delivered",v:orders.filter(o=>o.status==="delivered").length+" orders",c:"var(--blue)"},
        {l:"Cancelled",v:orders.filter(o=>o.status==="cancelled").length+" orders",c:"var(--red)"},
      ].map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--sf2);border-radius:4px;margin-bottom:5px">
        <span style="font-size:12px;color:var(--tx2)">${r.l}</span>
        <span style="font-size:13px;font-weight:${r.b?700:500};color:${r.c}">${r.v}</span>
      </div>`).join("")}
    </div>
  </div>
  <div class="card">
    <div class="ch"><div><div class="ct">Product Profit Analysis</div><div class="cs">Set cost prices per product for accurate margin tracking</div></div><button class="btn btn-o btn-sm" onclick="goTo('products')">Edit Cost Prices</button></div>
    ${byP.length===0 ? `<div class="empty"><div class="eico">📦</div><p>No sales data yet</p></div>` : `
    <div class="tw"><table>
      <thead><tr><th>Product</th><th>Units Sold</th><th>Revenue</th><th>Cost</th><th>Profit</th><th>Margin</th><th>Bar</th></tr></thead>
      <tbody>${byP.map(({p,u,r,c,pr,pm}) => {
        const clr = parseFloat(pm)>=40?"var(--green)":parseFloat(pm)>=20?"var(--gold)":"var(--red)";
        return `<tr>
          <td><div style="font-weight:500">${esc(p.name)}</div><div style="font-size:10px;color:var(--tx3)">Sell $${p.price} · Cost ${p.costPrice?"$"+p.costPrice:"<span style='color:var(--red)'>not set</span>"}</div></td>
          <td>${u}</td><td style="font-weight:700;color:var(--gold)">$${fmt(r)}</td>
          <td style="color:var(--red)">${c?"$"+fmt(c):"—"}</td>
          <td style="font-weight:700;color:${pr>=0?"var(--green)":"var(--red)"}">${pr>=0?"+":""}$${fmt(pr)}</td>
          <td style="font-weight:700;color:${clr}">${pm}%</td>
          <td style="width:80px"><div class="pt"><div class="pf" style="width:${Math.min(100,Math.max(0,pm))}%;background:${clr}"></div></div></td>
        </tr>`;
      }).join("")}</tbody>
    </table></div>`}
  </div>`;
}

function tProds() {

    ${S.categories.map(c=>`<button class="btn btn-sm ${S.prodCat===c.id?"btn-g":"btn-o"}" onclick="S.prodCat='${c.id}';rp()">${esc(c.label)} (${S.products.filter(p=>p.collection===c.id).length})</button>`).join("")}

    <button class="btn btn-sm btn-o" onclick="bulkFeat(false)">Unfeature All</button>
    <button class="btn btn-sm btn-d" onclick="bulkDelete()">🗑 Delete Selected</button>
    <button class="btn btn-sm btn-o" style="margin-left:auto" onclick="S.selProds.clear();rp()">Clear</button>

        <th>Image</th><th>Product</th><th>Category</th><th>Cost</th><th>Price</th><th>Margin</th><th>Badge</th><th>Featured</th><th>Actions</th>
      </tr></thead>
      <tbody>${list.length===0 ? `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--tx3)">No products found</td></tr>` :
      list.map(p => {
        const m = mg(p.price, p.costPrice);
        const checked = sel.has(p.id);
        return `<tr style="${checked?"background:var(--gbg)":""}">
          <td><input type="checkbox" ${checked?"checked":""} onchange="toggleProdSel(${p.id},this.checked)" style="cursor:pointer"/></td>
          <td style="padding:10px 14px">
            <div style="width:40px;height:54px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center">
              ${imgSrc(p.images&&p.images[0]) ? `<img src="${esc(p.images[0])}" style="width:100%;height:100%;object-fit:cover"/>` : `<span style="font-size:8px;color:var(--tx3)">${IC.img}</span>`}
            </div>
          </td>
          <td>
            <div style="font-weight:500">${esc(p.name)}</div>
            <div style="font-size:10px;color:var(--tx3)">${esc(p.subtitle||"")}</div>
          </td>
          <td><span style="background:var(--sf2);border:1px solid var(--bd);padding:2px 8px;font-size:10px;border-radius:3px">${esc(p.collection)}</span></td>
          <td>${p.costPrice?`<span style="color:var(--red);font-weight:500">$${p.costPrice}</span>`:`<span style="color:var(--tx4);font-size:10px">⚠ None</span>`}</td>
          <td><span style="font-weight:700;color:var(--gold)">$${p.price}</span>${p.originalPrice?`<span style="text-decoration:line-through;font-size:10px;color:var(--tx3);margin-left:4px">$${p.originalPrice}</span>`:""}</td>
          <td>${m!==null?`<span style="font-weight:700;color:${mc(m)}">${m}%</span>`:`<span style="color:var(--tx4)">—</span>`}</td>
          <td>${p.badge?`<span class="badge bg">${esc(p.badge)}</span>`:""}</td>
          <td><label class="sw"><input type="checkbox" ${p.featured?"checked":""} onchange="toggleFeat(${p.id},this.checked)"><span class="swt"></span></label></td>
          <td><div style="display:flex;gap:5px">
            <button class="bi" onclick="openProdModal(${p.id})" title="Edit">${IC.ed}</button>
            <button class="bi bi-r" onclick="delProd(${p.id})" title="Delete">${IC.tr}</button>
          </div></td>
        </tr>`;
      }).join("")}</tbody>
    </table></div>
  </div>`;
}

function toggleProdSel(id, val) { val ? S.selProds.add(id) : S.selProds.delete(id); rp(); }
function toggleAllProds(val) { if(val) S.products.forEach(p=>S.selProds.add(p.id)); else S.selProds.clear(); rp(); }
async function bulkFeat(val) {
  const ids = [...S.selProds];
  toast(`Updating ${ids.length} products…`, "info");
  await Promise.all(ids.map(id => A.pu("/products/"+id, {featured:val}).then(u=>{S.products=S.products.map(p=>p.id===id?u:p);})));
  S.selProds.clear(); toast(val?"Marked featured":"Removed from featured"); rp();
}
async function bulkDelete() {
  if (!confirm(`Delete ${S.selProds.size} products? This cannot be undone.`)) return;
  const ids = [...S.selProds];
  await Promise.all(ids.map(id => A.de("/products/"+id)));
  S.products = S.products.filter(p => !ids.includes(p.id));
  S.selProds.clear(); toast("Deleted "+ids.length+" products"); rp();
}

// ─────────────────────────────────────────────
function tImages() {

  S.products.forEach(p => {
    (p.images||[]).forEach(img => {

      <input type="file" accept="image/*" multiple onchange="uploadLibraryImgs(this)"/>

      <span style="font-size:12px">Drop images here or click to upload<br><span style="color:var(--tx4)">PNG, JPG, WebP up to 5MB each</span></span>

  </div>
  <div class="card">
    <div class="csec">Product Images (${allImgs.length})</div>
    ${allImgs.length===0 ? `<div class="empty"><div class="eico">🖼</div><p>No images yet.<br><span style="font-size:12px">Upload images when editing products.</span></p></div>` :
    `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px">
      ${allImgs.map(({url,prodName,prodId})=>`
      <div style="position:relative;border-radius:6px;overflow:hidden;background:var(--sf2);border:1px solid var(--bd);cursor:pointer;transition:border-color .15s" title="${esc(prodName)}" onclick="openProdModal(${prodId})" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--bd)'">
        <div style="aspect-ratio:3/4"><img src="${esc(url)}" style="width:100%;height:100%;object-fit:cover"/></div>
        <div style="padding:5px 7px;background:var(--sf3)">
          <div style="font-size:9px;color:var(--tx3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(prodName)}</div>
        </div>
      </div>`).join("")}
    </div>`}
  </div>`;
}

async function uploadLibraryImgs(input) {
  const files = Array.from(input.files); if (!files.length) return;
  const prog = $("lib-prog"), fill = $("lib-prog-fill");
  if (prog) { prog.classList.add("show"); }
  let done = 0;
  toast(`Uploading ${files.length} image${files.length>1?"s":""}…`, "info");
  for (const file of files) {
    try { await A.up(file); done++; if(fill) fill.style.width=(done/files.length*100)+"%"; } catch(e) { toast("Failed: "+file.name,"err"); }
  }
  if (prog) prog.classList.remove("show");
  toast("Uploaded "+done+" image"+( done!==1?"s":""));
}

async function handleLibDrop(e) {
  e.preventDefault(); e.currentTarget.classList.remove("drag");
  const files = Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith("image/"));
  if (!files.length) return;
  toast(`Uploading ${files.length} dropped image${files.length>1?"s":""}…`, "info");
  let done = 0;
  for (const file of files) { try { await A.up(file); done++; } catch(e) { toast("Failed: "+file.name,"err"); } }
  toast("Uploaded "+done+" image"+( done!==1?"s":""));
}

          <td>${(o.items||[]).length} item${(o.items||[]).length!==1?"s":""}</td>

              ${["pending","processing","shipped","delivered","cancelled"].map(s=>`<option value="${s}"${o.status===s?" selected":""}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join("")}

function tModal() {
  const m = S.modal;
  if (m.type==="prod") return tProdModal(m.data);
  if (m.type==="cat") return tCatModal(m.data);
  if (m.type==="ord") return tOrdModal(m.data);
  return "";
}

  return `<div class="mbg" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
  <div class="mh">
    <div><div class="mt">${isE ? "Edit: "+esc(p.name) : "Add New Product"}</div>${isE?`<div style="font-size:10px;color:var(--tx3);margin-top:2px">ID #${p.id}</div>`:""}</div>
    <button class="xb" onclick="closeModal()">✕</button>
  </div>
  <div class="mb">
    <div class="hrl"><span>Basic Info</span></div>
    <div class="f2">
      <div class="fg nm"><label>Product Name *</label><input id="pn" value="${esc(p.name||"")}"/></div>
      <div class="fg nm"><label>Subtitle / Material</label><input id="psub" value="${esc(p.subtitle||"")}"/></div>
    </div>
    <div class="fg" style="margin-top:14px"><label>Full Description</label><textarea id="pdesc" rows="3">${esc(p.description||"")}</textarea></div>
    <div class="f2">
      <div class="fg nm"><label>Category *</label><select id="pcol">${S.categories.map(c=>`<option value="${c.id}"${p.collection===c.id?" selected":""}>${esc(c.label)}</option>`).join("")}</select></div>
      <div class="fg nm"><label>Badge</label><select id="pbadge">
        <option value=""${!p.badge?" selected":""}>None</option>
        ${["Bestseller","New","Low Stock","Editor's Pick","Gift Ready","Handcrafted","Sale"].map(b=>`<option value="${b}"${p.badge===b?" selected":""}>${b}</option>`).join("")}
      </select></div>
    </div>

    <div class="hrl"><span>Pricing & Profit Calculator</span></div>
    <div class="f4">
      <div class="fg nm"><label>Cost Price ($)</label><input id="pcost" type="number" value="${p.costPrice||""}" oninput="liveMg()" placeholder="Your cost"/><div class="fhint">What you pay supplier</div></div>
      <div class="fg nm"><label>Sell Price ($) *</label><input id="pprice" type="number" value="${p.price||""}" oninput="liveMg()" placeholder="Customer pays"/><div class="fhint">Store display price</div></div>
      <div class="fg nm"><label>Original Price ($)</label><input id="porig" type="number" value="${p.originalPrice||""}" placeholder="For sale tag"/><div class="fhint">Shown as strikethrough</div></div>
      <div class="fg nm"><label>Profit Margin</label>
        <div class="mgb" id="mgb" style="color:${mc(m)}">${m!==null?m+"%":"—"}</div>
        <div id="mgh" class="fhint ${m!==null?(m>=30?"ok":m>=15?"warn":"bad"):""}">${m!==null?(m>=40?"✓ Excellent":m>=30?"✓ Good":m>=15?"⚠ Low margin":"✕ Very low"):"Enter both prices"}</div>
      </div>
    </div>

    <div class="hrl"><span>Product Images</span></div>
    <div class="ig" id="igrid">
      ${imgs.map((img,i)=>`<div class="ic">${imgSrc(img)?`<img src="${esc(img)}" loading="lazy"/>`:`<div class="iph">${IC.img}<span style="font-size:8px">${esc(img)}</span></div>`}${i===0?`<div class="main-badge">Main</div>`:""}
        <button class="rm" onclick="rmImg(${i})">✕</button></div>`).join("")}

    <div class="hrl"><span>Sizes / Variants</span></div>
    <div id="sz-tags" class="tags">${sizes.map(s=>`<span class="tag">${esc(s)}<button class="tdel" onclick="rmTag('sz','${esc(s)}')">×</button></span>`).join("")}</div>

        <label style="font-size:13px;color:var(--tx2);text-transform:none;letter-spacing:0;cursor:pointer" for="pfeat">Featured on homepage</label>
      </div>
    </div>

  <div class="mf">
    <button class="btn btn-o" onclick="closeModal()">Cancel</button>
    <button class="btn btn-g" onclick="saveProd(${p.id||"null"})">${isE?"Save Changes":"Create Product"}</button>

}

function tOrdModal(ordId) {
  const o = S.orders.find(x => x.id === ordId); if (!o) return "";
  const pr = (o.total||0) - (o.totalCost||0);
  const steps = ["pending","processing","shipped","delivered"], si = steps.indexOf(o.status);
  return `<div class="mbg" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
  <div class="mh">
    <div>
      <div class="mt">Order ${o.id}</div>
      <div style="font-size:11px;color:var(--tx3);margin-top:2px">${fmtDT(o.createdAt)}</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="badge ${sb(o.status)}">${o.status}</span>
      <button class="xb" onclick="closeModal()">✕</button>
    </div>
  </div>
  <div class="mb">
    ${o.status!=="cancelled" ? `<div class="ot">
      ${steps.map((step,i)=>{
        const done=i<si, act=i===si;
        return `<div class="ots${done?" done":act?" act":""}">
          <div class="otd${done?" done":act?" act":""}">${done?"✓":i+1}</div>
          <div class="otl${done?" done":act?" act":""}">${step}</div>
        </div>`;
      }).join("")}
    </div>` : `<div style="background:var(--rdbg);border:1px solid rgba(204,85,85,.2);border-radius:6px;padding:12px 16px;margin-bottom:18px;color:var(--red);font-size:13px">⚠ This order was cancelled</div>`}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
      <div class="csm" style="padding:14px">
        <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:10px;font-weight:600">Customer Details</div>
        <div style="font-weight:600;font-size:15px">${o.firstName||""} ${o.lastName||""}</div>
        <div style="font-size:12px;color:var(--blue);margin-top:3px">${o.email||""}</div>
        <div style="font-size:12px;color:var(--tx3);margin-top:10px;line-height:1.7">${o.address||""}<br/>${o.city||""} ${o.zip||""}</div>
      </div>
      <div class="csm" style="padding:14px">
        <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:10px;font-weight:600">Financials</div>
        ${[
          {l:"Order Revenue",v:"$"+fmt(o.total),c:"var(--gold)",b:true},
          {l:"Cost of Goods",v:o.totalCost?"$"+fmt(o.totalCost):"Not tracked",c:"var(--red)"},
          {l:"Net Profit",v:o.totalCost?(pr>=0?"+":"")+"$"+fmt(pr):"—",c:pr>=0?"var(--green)":"var(--red)",b:true},
          {l:"Shipping",v:"$"+fmt(o.shipping||0),c:"var(--tx2)"},
        ].map(r=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd)">
          <span style="font-size:12px;color:var(--tx3)">${r.l}</span>
          <span style="font-weight:${r.b?700:500};color:${r.c}">${r.v}</span>
        </div>`).join("")}
      </div>
    </div>

    <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:12px;font-weight:600">Items (${(o.items||[]).length})</div>
    <div style="border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-bottom:20px">
      ${(o.items||[]).length===0 ? `<div style="padding:20px;text-align:center;color:var(--tx3)">No items recorded</div>` :
      (o.items||[]).map((item,i)=>{
        const prod = S.products.find(p=>p.id===item.id);
        return `<div style="display:flex;align-items:center;gap:14px;padding:12px 16px;${i>0?"border-top:1px solid var(--bd)":""}">
          <div style="width:40px;height:54px;background:var(--sf2);border-radius:4px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center">
            ${prod&&imgSrc(prod.images&&prod.images[0])?`<img src="${esc(prod.images[0])}" style="width:100%;height:100%;object-fit:cover"/>`:`<span style="font-size:8px;color:var(--tx3)">${esc(item.name||"").slice(0,3)}</span>`}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:500">${esc(item.name||"")}</div>
            <div style="font-size:11px;color:var(--tx3);margin-top:3px">
              ${item.size?`Size: ${esc(item.size)} · `:""}${item.color?`Color: ${esc(item.color)} · `:""}Qty: ${item.qty||1}
              ${prod&&prod.costPrice?` · Cost: $${fmt(prod.costPrice*item.qty)}`:""}
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-weight:700;color:var(--gold)">$${fmt(item.price*item.qty)}</div>
            <div style="font-size:10px;color:var(--tx3)">$${item.price} each</div>
          </div>
        </div>`;
      }).join("")}
    </div>

    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:12px;color:var(--tx2);font-weight:500">Update Status:</span>
      <select onchange="updOrdSt('${o.id}',this.value)" style="background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:8px 13px;font-size:12px;border-radius:4px;outline:none;cursor:pointer">
        ${["pending","processing","shipped","delivered","cancelled"].map(s=>`<option value="${s}"${o.status===s?" selected":""}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join("")}
      </select>
    </div>
  </div>
  <div class="mf"><button class="btn btn-o" onclick="closeModal()">Close</button></div>
</div></div>`;
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
function openProdModal(id) {
  const p = id ? JSON.parse(JSON.stringify(S.products.find(x=>x.id===id)||{})) : {};
  S.modal = {type:"prod", data:p}; render();
}
function openCatModal(id) {
  const c = id ? JSON.parse(JSON.stringify(S.categories.find(x=>x.id===id)||{})) : null;
  S.modal = {type:"cat", data:c}; render();
}
function openOrdModal(id) { S.modal = {type:"ord", data:id}; render(); }
function closeModal(e) { if (!e || e.target === e.currentTarget) { S.modal = null; render(); } }

function liveMg() {
  const cost=parseFloat($("pcost")?.value)||0, price=parseFloat($("pprice")?.value)||0;
  const mb=$("mgb"), mh=$("mgh"); if (!mb) return;
  if (price>0) {
    const m=Math.round((price-cost)/price*100);
    mb.textContent=m+"%"; mb.style.color=mc(m);
    if(mh){mh.textContent=m>=40?"✓ Excellent":m>=30?"✓ Good":m>=15?"⚠ Low margin":"✕ Very low";mh.className="fhint "+(m>=30?"ok":m>=15?"warn":"bad");}
  } else { mb.textContent="—"; mb.style.color="var(--tx3)"; }
}

// Tags
function addTag(type) {
  const p = S.modal?.data; if (!p) return;
  if (type==="sz") {
    const v=$("nsz")?.value?.trim(); if(!v) return;
    if(!p.sizes) p.sizes=[];
    if(!p.sizes.includes(v)) p.sizes.push(v);
    $("nsz").value="";
    $("sz-tags").innerHTML=p.sizes.map(s=>`<span class="tag">${esc(s)}<button class="tdel" onclick="rmTag('sz','${esc(s)}')">×</button></span>`).join("");
  } else {
    const v=$("ndt")?.value?.trim(); if(!v) return;
    if(!p.details) p.details=[];
    p.details.push(v); $("ndt").value="";
    $("dt-tags").innerHTML=p.details.map((d,i)=>`<span class="tag">${esc(d)}<button class="tdel" onclick="rmTag('dt',${i})">×</button></span>`).join("");
  }
}
function rmTag(type,key) {
  const p = S.modal?.data; if (!p) return;
  if(type==="sz"){p.sizes=(p.sizes||[]).filter(s=>s!==key);$("sz-tags").innerHTML=p.sizes.map(s=>`<span class="tag">${esc(s)}<button class="tdel" onclick="rmTag('sz','${esc(s)}')">×</button></span>`).join("");}
  else{(p.details=p.details||[]).splice(key,1);$("dt-tags").innerHTML=p.details.map((d,i)=>`<span class="tag">${esc(d)}<button class="tdel" onclick="rmTag('dt',${i})">×</button></span>`).join("");}
}
function addColor() {
  const p=S.modal?.data; if(!p) return;
  const name=$("ncn")?.value?.trim(); if(!name) return;
  const hex=$("nch")?.value||"#ccc";
  if(!p.colors) p.colors=[]; p.colors.push({name,hex}); $("ncn").value="";
  $("cl-tags").innerHTML=p.colors.map(c=>`<span class="tag"><span class="csw" style="background:${c.hex}"></span>${esc(c.name)}<button class="tdel" onclick="rmColor('${esc(c.name)}')">×</button></span>`).join("");
}
function rmColor(name) {
  const p=S.modal?.data; if(!p) return;
  p.colors=(p.colors||[]).filter(c=>c.name!==name);
  $("cl-tags").innerHTML=p.colors.map(c=>`<span class="tag"><span class="csw" style="background:${c.hex}"></span>${esc(c.name)}<button class="tdel" onclick="rmColor('${esc(c.name)}')">×</button></span>`).join("");
}

// Image upload
function rebuildGrid() {
  const p=S.modal?.data; if(!p) return;
  $("igrid").innerHTML=p.images.map((img,i)=>`<div class="ic">${imgSrc(img)?`<img src="${esc(img)}" loading="lazy"/>`:`<div class="iph">${IC.img}<span style="font-size:8px">${esc(img)}</span></div>`}${i===0?`<div class="main-badge">Main</div>`:""}<button class="rm" onclick="rmImg(${i})">✕</button></div>`).join("")+
    `<label class="iup" id="iup-label" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleImgDrop(event)"><input type="file" accept="image/*" multiple onchange="upImgs(this)"/>${IC.upl}<span>Drop or click<br>to upload</span><div class="upload-progress" id="img-prog"><div class="upload-progress-fill" id="img-prog-fill"></div></div></label>`;
  $("pimgs").value=p.images.join(", ");
  const cnt=$("img-count"); if(cnt) cnt.textContent=p.images.length+" image"+(p.images.length!==1?"s":"")+" · First image is the main product photo";
}

async function upImgs(input) {
  const files=Array.from(input.files); if(!files.length) return;
  const p=S.modal?.data; if(!p) return; if(!p.images) p.images=[];
  const prog=$("img-prog"), fill=$("img-prog-fill");
  if(prog) prog.classList.add("show");
  toast("Uploading "+files.length+" image"+(files.length>1?"s":"")+"…","info");
  let done=0;
  for(const file of files){
    try{const r=await A.up(file);if(r.url)p.images.push(r.url);done++;if(fill)fill.style.width=(done/files.length*100)+"%";}
    catch(e){toast("Failed: "+file.name,"err");}
  }
  if(prog){prog.classList.remove("show");if(fill)fill.style.width="0";}
  rebuildGrid(); toast("Uploaded "+done+" image"+(done!==1?"s":""));
}

async function handleImgDrop(e) {
  e.preventDefault(); e.currentTarget.classList.remove("drag");
  const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith("image/"));
  if(!files.length) return;
  const p=S.modal?.data; if(!p) return; if(!p.images) p.images=[];
  toast("Uploading "+files.length+" dropped image"+(files.length>1?"s":"")+"…","info");
  let done=0;
  for(const file of files){try{const r=await A.up(file);if(r.url)p.images.push(r.url);done++;}catch(e){toast("Failed","err");}}
  rebuildGrid(); toast("Uploaded "+done+" image"+(done!==1?"s":""));
}

function rmImg(i){const p=S.modal?.data;if(!p||!p.images)return;p.images.splice(i,1);rebuildGrid();}

// Save product
async function saveProd(id) {
  const name=$("pn")?.value?.trim(), price=parseFloat($("pprice")?.value);
  if(!name){toast("Product name is required","err");return;}
  if(!price){toast("Sell price is required","err");return;}
  const p=S.modal?.data||{};
  const imgs=$("pimgs")?.value?.split(",").map(s=>s.trim()).filter(Boolean)||[];
  const data={...p,name,price,
    costPrice:parseFloat($("pcost")?.value)||0,
    subtitle:$("psub")?.value||"",
    description:$("pdesc")?.value||"",
    originalPrice:parseFloat($("porig")?.value)||null,
    collection:$("pcol")?.value,
    badge:$("pbadge")?.value||null,
    images:imgs,
    featured:$("pfeat")?.checked||false,
    rating:parseFloat($("prat")?.value)||4.5,
    reviews:parseInt($("prev")?.value)||0
  };
  try {
    if(id!==null&&id!==undefined&&id!=="null"){
      const u=await A.pu("/products/"+id,data);
      S.products=S.products.map(p=>p.id===id?u:p);
      toast("Product updated ✓");
    } else {
      const c=await A.po("/products",data);
      S.products.push(c);
      toast("Product created ✓");
    }
    S.modal=null; render();
  } catch(e){toast("Save failed: "+e.message,"err");}
}

async function delProd(id){
  if(!confirm("Delete this product? This cannot be undone.")) return;
  try{await A.de("/products/"+id);S.products=S.products.filter(p=>p.id!==id);toast("Product deleted");render();}
  catch(e){toast("Failed to delete","err");}
}

async function toggleFeat(id,val){
  try{await A.pu("/products/"+id,{featured:val});S.products=S.products.map(p=>p.id===id?{...p,featured:val}:p);toast(val?"Marked as featured":"Removed from featured");}
  catch(e){toast("Failed","err");}
}

// Save category
async function saveCat(eid){
  const label=$("cl")?.value?.trim(); if(!label){toast("Category name is required","err");return;}
  try{
    if(eid){const u=await A.pu("/categories/"+eid,{label});S.categories=S.categories.map(c=>c.id===eid?u:c);toast("Category updated");}
    else{const id=$("ci")?.value?.trim()||undefined;const c=await A.po("/categories",{label,id});S.categories.push(c);toast("Category created");}
    S.modal=null;render();
  }catch(e){toast("Failed","err");}
}
async function delCat(id){
  if(!confirm("Delete category "+id+"? Products in this category will remain.")) return;
  try{await A.de("/categories/"+id);S.categories=S.categories.filter(c=>c.id!==id);toast("Deleted");render();}
  catch(e){toast("Failed","err");}
}

// Update order status
async function updOrdSt(id,status){
  try{
    const u=await A.pu("/orders/"+id,{status});
    S.orders=S.orders.map(o=>o.id===id?u:o);
    toast("Order status: "+status);
    if(S.modal?.type==="ord"){S.modal={type:"ord",data:id};render();}else rp();
  }catch(e){toast("Failed","err");}
}

// Homepage save
function addT(){if(!S.homepage.testimonials)S.homepage.testimonials=[];S.homepage.testimonials.push({quote:"",author:"",role:"",product:"",rating:5});rp();}
function rmT(i){S.homepage.testimonials.splice(i,1);rp();}
async function saveHP(){
  const tels=$$(".tq").map((el,i)=>({quote:el.value,author:$$(".ta")[i]?.value||"",role:$$(".tr2")[i]?.value||"",product:$$(".tp")[i]?.value||"",rating:parseFloat($$(".tra")[i]?.value)||5}));
  const hp={
    hero:{badge:$("hb")?.value||"",headline:$("hh")?.value||"",subtext:$("hs")?.value||"",ctaText:$("hc")?.value||"",ctaSecondary:$("hc2")?.value||""},
    marquee:$("hm")?.value?.split(",").map(s=>s.trim()).filter(Boolean)||[],
    testimonials:tels
  };
  try{
    const r=await fetch("/api/admin/homepage",{method:"PUT",headers:{"Content-Type":"application/json","X-Admin-Token":TK},body:JSON.stringify(hp)});

    const u=await r.json();S.homepage=u;toast("Homepage saved ✓ — reload store to see changes");
  }catch(e){toast("Network error","err");}

// Settings save
async function saveSet(){
  const s={storeName:$("sn")?.value||"AURAH",tagline:$("st")?.value||"",email:$("se")?.value||"",instagram:$("si")?.value||"",accentColor:$("sa")?.value||"#c9a85c",theme:$("sth")?.value||"dark",fontPair:$("sf")?.value||"cormorant",heroLayout:$("sh2")?.value||"split",cardRadius:parseInt($("sr")?.value)||0,currencySymbol:$("sc")?.value||"$",freeShippingThreshold:parseFloat($("sfs")?.value)||150,shippingCost:parseFloat($("ssc")?.value)||18};

    const r=await fetch("/api/admin/settings",{method:"PUT",headers:{"Content-Type":"application/json","X-Admin-Token":TK},body:JSON.stringify(s)});

    const u=await r.json();S.settings=u;toast("Settings saved ✓ — reload store to apply");
  }catch(e){toast("Network error","err");}

// Keys & misc
function bindKeys(){
  document.onkeydown=e=>{if(e.key==="Escape"&&S.modal){S.modal=null;render();}};
  $("nsz")?.addEventListener("keydown",e=>{if(e.key==="Enter")addTag("sz");});
  $("ndt")?.addEventListener("keydown",e=>{if(e.key==="Enter")addTag("dt");});
  $("ncn")?.addEventListener("keydown",e=>{if(e.key==="Enter")addColor();});
  $("tkin")?.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
}

// Init
render();
if(S.auth) loadAll();
</script>
