<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AURAH — Premium Lifestyle</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background 0.4s ease, color 0.4s ease;
  }
  body.dark { background: #0c0b09; color: #f0ece4; }
  body.light { background: #f7f3ec; color: #1a1714; }
  input, select, button { font-family: inherit; }
  img { max-width: 100%; display: block; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(201,168,92,0.3); border-radius: 2px; }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes scrollPulse { 0%, 100% { opacity: 0.3; transform: scaleY(0.6); } 50% { opacity: 1; transform: scaleY(1); } }
  @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popupIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .page-enter { animation: fadeIn 0.45s ease forwards; }

  /* Responsive */
  @media (max-width: 900px) {
    .product-grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
    .category-grid { grid-template-columns: 1fr !important; }
    .footer-grid { grid-template-columns: 1fr 1fr !important; }
    .trust-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .testimonial-grid { grid-template-columns: 1fr !important; }
    .editorial-split { grid-template-columns: 1fr !important; }
    .cart-grid { grid-template-columns: 1fr !important; }
    .product-detail-grid { grid-template-columns: 1fr !important; }
    .hide-mobile { display: none !important; }
    .show-mobile { display: flex !important; }
  }
  @media (max-width: 600px) {
    .product-grid-4 { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }
  }
</style>
</head>
<body class="dark">

<div id="root"></div>

<script type="text/babel" src="public/js/store-data.jsx"></script>
<script type="text/babel" src="public/js/components.jsx"></script>
<script type="text/babel" src="public/js/home-page.jsx"></script>
<script type="text/babel" src="public/js/shop-pages.jsx"></script>
<script type="text/babel" src="public/js/cart-checkout.jsx"></script>
<script type="text/babel" src="public/js/tweaks-panel.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#c9a85c",
  "storeName": "AURAH",
  "fontPair": "cormorant",
  "theme": "dark",
  "animSpeed": "medium",
  "heroLayout": "split",
  "cardRadius": 0
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);
  const [theme, setTheme] = React.useState(tweaks.theme || "dark");
  const [page, setPage] = React.useState("home");
  const [pageParams, setPageParams] = React.useState({});
  const [cart, setCart] = React.useState([]);
  const [wishlistIds, setWishlistIds] = React.useState([]);
  const [cartOpen, setCartOpen] = React.useState(false);
  const [showPopup, setShowPopup] = React.useState(false);
  const [lastOrder, setLastOrder] = React.useState(null);
  const prevPage = React.useRef("home");

  // Theme sync
  React.useEffect(() => {
    document.body.className = theme;
  }, [theme]);

  // Popup timer
  React.useEffect(() => {
    const t = setTimeout(() => setShowPopup(true), 6000);
    return () => clearTimeout(t);
  }, []);

  // Scroll to top on page change
  React.useEffect(() => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, [page]);

  // Expose context for shared components
  window.__appContext = { tweaks };

  const navigate = (p, params = {}) => {
    prevPage.current = page;
    setPage(p);
    setPageParams(params);
  };

  const addToCart = (product, size, color, qty = 1) => {
    setCart(prev => {
      const key = `${product.id}-${size}-${color}`;
      const existing = prev.find(i => `${i.id}-${i.size}-${i.color}` === key);
      if (existing) return prev.map(i => `${i.id}-${i.size}-${i.color}` === key ? { ...i, qty: i.qty + qty } : i);
      return [...prev, {
        id: product.id, name: product.name, price: product.price,
        image: product.images[0], size, color, qty,
      }];
    });
    setCartOpen(true);
  };

  const updateQty = (id, size, color, qty) => {
    if (qty <= 0) removeFromCart(id, size, color);
    else setCart(prev => prev.map(i => i.id === id && i.size === size && i.color === color ? { ...i, qty } : i));
  };

  const removeFromCart = (id, size, color) => {
    setCart(prev => prev.filter(i => !(i.id === id && i.size === size && i.color === color)));
  };

  const toggleWishlist = (id) => {
    setWishlistIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };

  const placeOrder = (form) => {
    setLastOrder(form);
    setCart([]);
  };

  // Dynamic font injection
  const fontMap = {
    cormorant: "'Cormorant Garamond', serif",
    playfair: "'Playfair Display', serif",
    outfit: "'Outfit', sans-serif",
  };
  const bodyFont = fontMap[tweaks.fontPair] || fontMap.cormorant;

  const accent = tweaks.accentColor || "#c9a85c";
  const storeName = tweaks.storeName || "AURAH";
  const isDark = theme === "dark";

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  const sharedProps = { onNavigate: navigate, onAddToCart: addToCart, onToggleWishlist: toggleWishlist, wishlistIds, theme };

  const renderPage = () => {
    const key = `${page}-${JSON.stringify(pageParams)}`;
    const inner = (() => {
      switch (page) {
        case "home": return <HomePage {...sharedProps} />;
        case "collection": return <CollectionPage params={pageParams} {...sharedProps} />;
        case "product": return <ProductPage params={pageParams} {...sharedProps} />;
        case "cart": return <CartPage cart={cart} onNavigate={navigate} onUpdateQty={updateQty} onRemove={removeFromCart} theme={theme} />;
        case "checkout": return <CheckoutPage cart={cart} onNavigate={navigate} onPlaceOrder={placeOrder} theme={theme} />;
        case "confirmation": return <ConfirmationPage onNavigate={navigate} theme={theme} lastOrder={lastOrder} />;
        case "wishlist": return <WishlistPage {...sharedProps} />;
        default: return <HomePage {...sharedProps} />;
      }
    })();
    return <div key={key} className="page-enter">{inner}</div>;
  };

  return (
    <div style={{
      minHeight: "100vh",
      fontFamily: "'Outfit', sans-serif",
      color: isDark ? "#f0ece4" : "#1a1714",
      "--accent": accent,
    }}>
      {/* CSS accent override */}
      <style>{`
        :root { --accent: ${accent}; }
        .accent { color: ${accent}; }
        ::selection { background: ${accent}33; }
        input:focus { border-color: ${accent} !important; }
      `}</style>

      <Nav
        page={page} onNavigate={navigate}
        cartCount={cartCount} wishlistCount={wishlistIds.length}
        theme={theme} onToggleTheme={() => setTheme(t => t === "dark" ? "light" : "dark")}
        onOpenCart={() => setCartOpen(true)}
      />

      {renderPage()}

      {/* Footer on most pages */}
      {!["checkout","confirmation"].includes(page) && (
        <Footer theme={theme} onNavigate={navigate} />
      )}

      {/* Cart Drawer */}
      {cartOpen && (
        <CartDrawer
          cart={cart} onClose={() => setCartOpen(false)}
          onNavigate={navigate} onUpdateQty={updateQty} onRemove={removeFromCart} theme={theme}
        />
      )}

      {/* Email Popup */}
      {showPopup && page === "home" && (
        <EmailPopup theme={theme} onDismiss={() => setShowPopup(false)} />
      )}

      {/* Tweaks Panel */}
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks}>
        <TweakSection title="Brand">
          <TweakText id="storeName" label="Store Name" value={tweaks.storeName} onChange={v => setTweaks({ storeName: v })} />
          <TweakColor id="accentColor" label="Accent Color" value={tweaks.accentColor} onChange={v => setTweaks({ accentColor: v })} />
        </TweakSection>
        <TweakSection title="Appearance">
          <TweakRadio id="theme" label="Mode" value={theme}
            options={[{ value: "dark", label: "Dark" }, { value: "light", label: "Light" }]}
            onChange={v => { setTheme(v); setTweaks({ theme: v }); }} />
          <TweakSelect id="fontPair" label="Font" value={tweaks.fontPair}
            options={[{ value: "cormorant", label: "Cormorant (Serif)" }, { value: "outfit", label: "Outfit (Sans)" }]}
            onChange={v => setTweaks({ fontPair: v })} />
          <TweakSlider id="cardRadius" label="Card Radius" value={tweaks.cardRadius} min={0} max={16} step={2}
            onChange={v => setTweaks({ cardRadius: v })} />
        </TweakSection>
        <TweakSection title="Layout">
          <TweakRadio id="heroLayout" label="Hero Style" value={tweaks.heroLayout}
            options={[{ value: "split", label: "Split" }, { value: "centered", label: "Centered" }]}
            onChange={v => setTweaks({ heroLayout: v })} />
          <TweakRadio id="animSpeed" label="Animations" value={tweaks.animSpeed}
            options={[{ value: "fast", label: "Fast" }, { value: "medium", label: "Medium" }, { value: "slow", label: "Slow" }]}
            onChange={v => setTweaks({ animSpeed: v })} />
        </TweakSection>
        <TweakSection title="Navigation">
          <TweakButton label="→ Home" onClick={() => navigate("home")} />
          <TweakButton label="→ Collection" onClick={() => navigate("collection")} />
          <TweakButton label="→ Product Detail" onClick={() => navigate("product", { productId: 1 })} />
          <TweakButton label="→ Cart" onClick={() => navigate("cart")} />
          <TweakButton label="→ Checkout" onClick={() => navigate("checkout")} />
          <TweakButton label="→ Confirmation" onClick={() => navigate("confirmation")} />
          <TweakButton label="→ Wishlist" onClick={() => navigate("wishlist")} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
